// ── ストレージ ──
const STORE_KEY="kumiai-stats-v1";
function loadStats(){try{const v=localStorage.getItem(STORE_KEY);return v?JSON.parse(v):{total:0,today:0,lastDate:"",byArticle:{},dailyLog:{}};}catch{return{total:0,today:0,lastDate:"",byArticle:{},dailyLog:{}};}}
function saveStats(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch{}}
function recordLogin(){const s=loadStats();const today=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});s.total=(s.total||0)+1;if(s.lastDate!==today){s.today=0;s.lastDate=today;}s.today=(s.today||0)+1;s.dailyLog=s.dailyLog||{};s.dailyLog[today]=(s.dailyLog[today]||0)+1;saveStats(s);return s;}
function recordArticle(id,title){const s=loadStats();s.byArticle=s.byArticle||{};s.byArticle[id]={title,count:((s.byArticle[id]?.count)||0)+1};saveStats(s);}

  const pat=Array.from({length:25},(_,r)=>Array.from({length:25},(_,c)=>{
    const tl=r<8&&c<8,tr=r<8&&c>=17,bl=r>=17&&c<8;
    if(tl||tr||bl){const rr=bl?r-17:r,cc=tr?c-17:c;return(rr===0||rr===6||cc===0||cc===6||rr>=2&&rr<=4&&cc>=2&&cc<=4)?1:0;}
    if(r===6||c===6)return(r+c)%2===0?1:0;
    h=(h*1664525+1013904223)&0xffffffff;
    return(Math.abs(h)+(value.charCodeAt((r*25+c)%value.length)>>(c%8)&1))%3===0?1:0;
  }));
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:"block"}}>
    <rect width={size} height={size} fill="white"/>
    {pat.map((row,r)=>row.map((v,c)=>v?<rect key={`${r}-${c}`} x={c*cell+.5} y={r*cell+.5} width={cell-1} height={cell-1} fill="#1a3a6b"/>:null))}
  </svg>;
}

// ── PIN画面 ──
function PinScreen({mode,onSuccess,onBack}){
  const [pin,setPin]=useState(["","","",""]);
  const [err,setErr]=useState(false);
  const [shake,setShake]=useState(false);
  const change=(idx,val)=>{
    if(!/^\d?$/.test(val))return;
    const n=[...pin];n[idx]=val;setPin(n);
    if(val&&idx<3)document.getElementById(`p${idx+1}`)?.focus();
    if(n.every(d=>d!=="")){
      const e=n.join("");
      const ok=(mode==="member"&&e===MEMBER_PIN)||(mode==="admin"&&e===ADMIN_PIN);
      if(ok){setErr(false);setTimeout(onSuccess,350);}
      else{setShake(true);setErr(true);setTimeout(()=>{setShake(false);setPin(["","","",""]);document.getElementById("p0")?.focus();},700);}
    }
  };
  const kd=(idx,e)=>{if(e.key==="Backspace"&&!pin[idx]&&idx>0)document.getElementById(`p${idx-1}`)?.focus();};
  return(
    <div style={{minHeight:"100vh",background:"#f4f7fb",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:F.serif}}>
      <button onClick={onBack} style={{position:"absolute",top:20,left:20,background:"white",border:"2px solid #1a3a6b",color:"#1a3a6b",borderRadius:10,padding:"10px 18px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:F.sans}}>← 戻る</button>

        <div style={{display:"flex",gap:12,justifyContent:"center",transform:shake?"translateX(-8px)":"none",transition:"transform 0.1s"}}>
          {pin.map((d,i)=><input key={i} id={`p${i}`} type="tel" maxLength={1} value={d} onChange={e=>change(i,e.target.value)} onKeyDown={e=>kd(i,e)} autoFocus={i===0} style={{width:60,height:72,textAlign:"center",fontSize:30,fontWeight:800,fontFamily:"monospace",borderRadius:12,background:d?"#eef3fb":"#f5f5f5",border:err?"3px solid #b91c1c":d?"3px solid #1a3a6b":"3px solid #d0d0d0",color:"#1a3a6b"}}/>)}
        </div>
        {err&&<div style={{marginTop:14,padding:"10px 14px",background:"#fef2f2",border:"2px solid #b91c1c",borderRadius:10,color:"#b91c1c",fontSize:14,fontWeight:700,fontFamily:F.sans}}>暗証番号が違います。もう一度お試しください。</div>}

  );

// ── 反応データの読み書き（localStorage共有） ──
const RXN_KEY = "kumiai-reactions-v1";
function loadReactions(){try{const v=localStorage.getItem(RXN_KEY);return v?JSON.parse(v):{};} catch{return {};}}
function saveReactions(r){try{localStorage.setItem(RXN_KEY,JSON.stringify(r));}catch{}}

// 賛否投票
function voteYesNo(noticeId, qIdx, type){
  const r=loadReactions();
  const k=`${noticeId}-q${qIdx}`;
  if(!r[k])r[k]={yes:0,no:0,unsure:0,comments:[],interest:0};
  r[k][type]=(r[k][type]||0)+1;
  saveReactions(r);return r;
}
// 自由記入
function addComment(noticeId, qIdx, text){
  const r=loadReactions();
  const k=`${noticeId}-q${qIdx}`;
  if(!r[k])r[k]={yes:0,no:0,unsure:0,comments:[],interest:0};
  r[k].comments=[...(r[k].comments||[]),{text,time:new Date().toLocaleDateString("ja-JP",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}];
  saveReactions(r);return r;
}
// 関心度
function addInterest(noticeId){
  const r=loadReactions();
  const k=`${noticeId}-interest`;
  r[k]=(r[k]||0)+1;
  saveReactions(r);return r;
}

// ── 第3層 反応ウィジェット ──
function Layer3Widget({notice}){
  const [rxn,setRxn]=useState(loadReactions());
  const [voted,setVoted]=useState({});
  const [commented,setCommented]=useState({});
  const [inputs,setInputs]=useState({});
  const [interested,setInterested]=useState(false);
  const [showComments,setShowComments]=useState({});

  // 問いかけを行ごとにパース
  const questions=(notice.layer3||"").split("\n")
    .filter(l=>/^[①②③④⑤]/.test(l.trim()))
    .map((l,i)=>({idx:i,text:l.trim()}));

  const noticeInterest=(rxn[`${notice.id}-interest`]||0);
  const MAX_INTEREST=63; // 全63戸

  const handleVote=(qIdx,type)=>{
    if(voted[qIdx])return;
    const next=voteYesNo(notice.id,qIdx,type);
    setRxn({...next});
    setVoted(p=>({...p,[qIdx]:type}));
  };
  const handleComment=(qIdx)=>{
    const t=(inputs[qIdx]||"").trim();
    if(!t)return;
    const next=addComment(notice.id,qIdx,t);
    setRxn({...next});
    setInputs(p=>({...p,[qIdx]:""}));
    setCommented(p=>({...p,[qIdx]:true}));
  };
  const handleInterest=()=>{
    if(interested)return;
    const next=addInterest(notice.id);
    setRxn({...next});
    setInterested(true);
  };

  const getQ=(noticeId,qIdx)=>rxn[`${noticeId}-q${qIdx}`]||{yes:0,no:0,unsure:0,comments:[],interest:0};
  const total=(q)=>(q.yes||0)+(q.no||0)+(q.unsure||0);
  const pct=(v,t)=>t>0?Math.round((v/t)*100):0;

  return(
    <div>
      {/* 関心度バロメーター */}
      <div style={{background:"white",border:"2px solid #1a3a6b",borderRadius:14,padding:"16px 18px",marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:"#1a3a6b",fontFamily:F.sans}}>🌡️ この問題への関心度</div>
            <div style={{fontSize:12,color:"#888",fontFamily:F.sans,marginTop:2}}>関心がある方はボタンを押してください（匿名・1回のみ）</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:32,fontWeight:800,color:"#1a3a6b",fontFamily:F.sans,lineHeight:1}}>{noticeInterest}</div>
            <div style={{fontSize:11,color:"#888",fontFamily:F.sans}}>/ {MAX_INTEREST}戸</div>
          </div>
        </div>
        {/* バロメーターバー */}
        <div style={{height:20,background:"#eee",borderRadius:10,overflow:"hidden",marginBottom:12,position:"relative"}}>
          <div style={{height:"100%",width:`${Math.min((noticeInterest/MAX_INTEREST)*100,100)}%`,background:"linear-gradient(90deg,#1a3a6b,#3a6abf)",borderRadius:10,transition:"width 0.5s"}}/>
          {[25,50,75].map(p=>(
            <div key={p} style={{position:"absolute",top:0,left:`${p}%`,height:"100%",borderLeft:"1px dashed rgba(255,255,255,0.5)"}}/>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#bbb",fontFamily:F.sans,marginBottom:12}}>
          <span>0戸</span><span>16戸</span><span>32戸</span><span>47戸</span><span>63戸</span>
        </div>
        <button onClick={handleInterest} disabled={interested} style={{
          width:"100%",padding:"12px",borderRadius:10,border:"none",cursor:interested?"default":"pointer",
          background:interested?"#e0e7ef":"#1a3a6b",color:interested?"#888":"white",
          fontSize:15,fontWeight:800,fontFamily:F.sans,transition:"all 0.2s"
        }}>{interested?"✓ 関心を表明しました":"👆 この問題に関心があります"}</button>
      </div>

      {/* 問いかけ免責バナー */}
      <div style={{background:"#fef9c3",border:"1px solid #ca8a04",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#92400e",fontFamily:F.sans,lineHeight:1.7}}>
        💬 以下は<strong>組合員の皆様への問いかけ</strong>です。回答はすべて匿名です。皆様の意思表示が管理組合運営の改善につながります。
      </div>

      {/* 本文テキスト（問い以外の部分） */}
      {(()=>{
        const lines=(notice.layer3||"").split("\n");
        const nonQLines=lines.filter(l=>!/^[①②③④⑤]/.test(l.trim()));
        const introText=nonQLines.join("\n").replace(/\n{3,}/g,"\n\n").trim();
        return introText?<p style={{margin:"0 0 16px",lineHeight:2.0,fontSize:14,color:"#555",whiteSpace:"pre-line"}}>{introText}</p>:null;
      })()}

      {/* 各問いかけ */}
      {questions.map(({idx,text})=>{
        const q=getQ(notice.id,idx);
        const tot=total(q);
        const myVote=voted[idx];
        const cmts=q.comments||[];
        return(
          <div key={idx} style={{background:"white",border:"2px solid #fde68a",borderRadius:14,padding:"16px",marginBottom:14}}>
            <p style={{margin:"0 0 14px",fontSize:15,color:"#1a3a6b",fontWeight:700,lineHeight:1.7,fontFamily:F.serif}}>{text}</p>

            {/* 賛否ボタン */}
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {[
                {type:"yes",  label:"👍 そう思う",   active:"#1a3a6b", light:"#eef3fb"},
                {type:"no",   label:"👎 思わない",   active:"#b91c1c", light:"#fef2f2"},
                {type:"unsure",label:"🤔 わからない",active:"#6b7280", light:"#f3f4f6"},
              ].map(({type,label,active,light})=>(
                <button key={type} onClick={()=>handleVote(idx,type)} disabled={!!myVote} style={{
                  flex:1,minWidth:80,padding:"9px 4px",borderRadius:8,border:`2px solid ${myVote===type?active:"#e0e0e0"}`,
                  background:myVote===type?active:light,color:myVote===type?"white":"#444",
                  fontSize:13,fontWeight:myVote===type?800:600,fontFamily:F.sans,cursor:myVote?"default":"pointer",
                  transition:"all 0.2s"
                }}>
                  {label}<br/>
                  <span style={{fontSize:16,fontWeight:800}}>{q[type]||0}</span>
                  {tot>0&&<span style={{fontSize:10,opacity:0.8}}> ({pct(q[type]||0,tot)}%)</span>}
                </button>
              ))}
            </div>

            {/* 得票バー */}
            {tot>0&&(
              <div style={{display:"flex",height:8,borderRadius:4,overflow:"hidden",marginBottom:12}}>
                {[{t:"yes",c:"#1a3a6b"},{t:"no",c:"#b91c1c"},{t:"unsure",c:"#9ca3af"}].map(({t,c})=>
                  (q[t]||0)>0?<div key={t} style={{width:`${pct(q[t]||0,tot)}%`,background:c,transition:"width 0.4s"}}/>:null
                )}
              </div>
            )}
            <div style={{fontSize:11,color:"#aaa",fontFamily:F.sans,marginBottom:14}}>回答数：{tot}件</div>

            {/* 自由記入 */}
            <div style={{borderTop:"1px solid #f0f0f0",paddingTop:12}}>
              <div style={{fontSize:12,color:"#666",fontFamily:F.sans,fontWeight:700,marginBottom:8}}>💭 ご意見・コメント（任意・匿名）</div>
              {!commented[idx]?(
                <div style={{display:"flex",gap:8}}>
                  <input type="text" value={inputs[idx]||""} onChange={e=>setInputs(p=>({...p,[idx]:e.target.value}))}

                    style={{flex:1,padding:"9px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:13,fontFamily:F.serif,color:"#333"}}/>
                  <button onClick={()=>handleComment(idx)} style={{padding:"9px 16px",background:"#d97706",border:"none",borderRadius:8,color:"white",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:F.sans,flexShrink:0}}>送信</button>
                </div>
              ):(
                <div style={{padding:"8px 12px",background:"#fff7e6",borderRadius:8,fontSize:13,color:"#92400e",fontFamily:F.sans}}>✓ コメントを送信しました</div>
              )}
              {/* コメント一覧 */}
              {cmts.length>0&&(
                <div style={{marginTop:10}}>
                  <button onClick={()=>setShowComments(p=>({...p,[idx]:!p[idx]}))} style={{background:"none",border:"none",color:"#1a3a6b",fontSize:12,fontFamily:F.sans,cursor:"pointer",fontWeight:700,padding:0}}>
                    {showComments[idx]?"▼":"▶"} 組合員のコメント（{cmts.length}件）
                  </button>
                  {showComments[idx]&&(
                    <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6}}>
                      {cmts.map((c,ci)=>(

    <div style={{minHeight:"100vh",background:"#f0f2f5",fontFamily:F.serif}}>
      <div style={{background:"#1a252f",padding:"14px 18px",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onLogout} style={{background:"white",border:"none",color:"#1a252f",borderRadius:8,padding:"9px 16px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:F.sans}}>← ログアウト</button>
        <span style={{color:"white",fontSize:17,fontWeight:800,fontFamily:F.sans}}>🔑 管理者ダッシュボード</span>
        <button onClick={onNew} style={{marginLeft:"auto",background:"#f59e0b",border:"none",borderRadius:10,padding:"9px 18px",color:"#1a252f",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:F.sans}}>＋ 新規作成</button>
      </div>
      <div style={{padding:"14px",maxWidth:700,margin:"0 auto"}}>
        <AccessCounter stats={stats} isAdmin={true}/>
        <div style={{background:"#fffbeb",border:"2px solid #f59e0b",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:14,fontFamily:F.sans,color:"#78350f",fontWeight:600}}>⚠ 管理者モード：追加・編集・削除・固定が可能です</div>
        {notices.map(n=>(
          <div key={n.id} style={{background:"white",borderRadius:12,marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,0.08)",overflow:"hidden",borderLeft:`5px solid ${n.categoryColor}`}}>
            <div style={{padding:"13px 15px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                <span style={{background:n.categoryColor,color:"white",fontSize:12,fontWeight:800,padding:"3px 10px",borderRadius:4,fontFamily:F.sans}}>{n.category}</span>
                {n.pinned&&<span style={{fontSize:12,color:"#d97706",fontFamily:F.sans,fontWeight:700}}>📌</span>}
                <span style={{marginLeft:"auto",fontSize:12,color:"#666",fontFamily:F.sans}}>{n.date}</span>
              </div>
              <div style={{fontSize:14,color:"#1a3a6b",fontWeight:700,lineHeight:1.5,marginBottom:4}}>{n.title}</div>
              <div style={{display:"flex",gap:8,fontSize:11,fontFamily:F.sans,color:"#aaa"}}>
                {n.layer1&&<span style={{background:"#eef3fb",borderRadius:4,padding:"2px 6px",color:"#1a3a6b"}}>第1層✓</span>}
                {n.layer2&&<span style={{background:"#f0fdf4",borderRadius:4,padding:"2px 6px",color:"#166534"}}>第2層✓</span>}
                {n.layer3&&<span style={{background:"#fff7e6",borderRadius:4,padding:"2px 6px",color:"#92400e"}}>第3層✓</span>}
              </div>
            </div>
            <div style={{display:"flex",borderTop:"1px solid #f0f0f0"}}>
              <button onClick={()=>onEdit(n)} style={{flex:1,padding:"10px",background:"#f4f7fb",border:"none",cursor:"pointer",fontSize:14,color:"#1a3a6b",fontFamily:F.sans,fontWeight:700}}>✏ 編集</button>
              <button onClick={()=>onTogglePin(n.id)} style={{flex:1,padding:"10px",background:"white",border:"none",borderLeft:"1px solid #f0f0f0",cursor:"pointer",fontSize:13,color:n.pinned?"#d97706":"#888",fontFamily:F.sans}}>{n.pinned?"📌 解除":"📌 固定"}</button>
              {del===n.id?(<>
                <button onClick={()=>{onDelete(n.id);setDel(null);}} style={{flex:1,padding:"10px",background:"#b91c1c",border:"none",borderLeft:"1px solid #f0f0f0",cursor:"pointer",fontSize:14,color:"white",fontFamily:F.sans,fontWeight:800}}>本当に削除</button>
                <button onClick={()=>setDel(null)} style={{flex:1,padding:"10px",background:"#eee",border:"none",borderLeft:"1px solid #f0f0f0",cursor:"pointer",fontSize:13,color:"#555",fontFamily:F.sans}}>取消</button>
              </>):(
                <button onClick={()=>setDel(n.id)} style={{flex:1,padding:"10px",background:"white",border:"none",borderLeft:"1px solid #f0f0f0",cursor:"pointer",fontSize:13,color:"#b91c1c",fontFamily:F.sans,fontWeight:700}}>🗑 削除</button>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 一覧画面 ──
function BoardScreen({notices,stats,onSelect,onLogout}){
  const [tag,setTag]=useState("すべて");
  const sorted=[...(tag==="すべて"?notices:notices.filter(n=>n.tag===tag))].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.id-a.id);
  return(
    <div style={{minHeight:"100vh",background:"#f4f7fb",fontFamily:F.serif}}>
      <div style={{background:"#1a3a6b",padding:"18px 18px 0"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",marginBottom:6}}>
            <div>
              <div style={{fontSize:12,color:"#a8c4e8",letterSpacing:4,fontFamily:F.sans,marginBottom:3}}>MEMBERS ONLY</div>
              <h1 style={{color:"white",fontSize:20,margin:0,letterSpacing:2,fontWeight:800}}>組合員専用告知板</h1>
              <p style={{color:"#c8dcf4",fontSize:13,margin:"3px 0 0",fontFamily:F.sans}}>シティハウス円山北3条　管理組合</p>
            </div>
            <button onClick={onLogout} style={{marginLeft:"auto",background:"white",border:"none",color:"#1a3a6b",borderRadius:8,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:F.sans}}>ログアウト</button>
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:12,marginTop:10}}>
            {TAGS.map(t=><span key={t} onClick={()=>setTag(t)} style={{flexShrink:0,borderRadius:20,padding:"6px 14px",fontSize:13,fontFamily:F.sans,whiteSpace:"nowrap",cursor:"pointer",fontWeight:600,background:tag===t?"white":"rgba(255,255,255,0.12)",color:tag===t?"#1a3a6b":"#c8dcf4",border:tag===t?"none":"1px solid rgba(255,255,255,0.25)"}}>{t}</span>)}
          </div>
        </div>
      </div>
      <div style={{padding:"14px",maxWidth:700,margin:"0 auto"}}>
        <AccessCounter stats={stats} isAdmin={false}/>
        <div style={{fontSize:13,color:"#666",fontFamily:F.sans,marginBottom:10,fontWeight:600}}>{sorted.length}件のお知らせ</div>
        {sorted.map(n=>(
          <div key={n.id} onClick={()=>onSelect(n)}
            style={{background:"white",borderRadius:14,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.08)",overflow:"hidden",cursor:"pointer",borderLeft:`6px solid ${n.categoryColor}`}}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.13)";}}
            onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,0.08)";}}>
            <div style={{padding:"15px 17px"}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8,flexWrap:"wrap"}}>
                <span style={{background:n.categoryColor,color:"white",fontSize:12,fontWeight:800,padding:"3px 10px",borderRadius:4,fontFamily:F.sans}}>{n.category}</span>
                {n.pinned&&<span style={{background:"#fff7e6",border:"1px solid #d97706",color:"#92400e",fontSize:11,fontWeight:700,padding:"2px 7px",borderRadius:4,fontFamily:F.sans}}>📌 重要</span>}
                <span style={{fontSize:12,color:"#666",fontFamily:F.sans}}>{n.date}</span>
                {/* 層インジケーター */}
                <span style={{marginLeft:"auto",display:"flex",gap:3}}>
                  {n.layer1&&<span style={{fontSize:9,background:"#eef3fb",color:"#1a3a6b",borderRadius:3,padding:"1px 5px",fontFamily:F.sans}}>事実</span>}
                  {n.layer2&&<span style={{fontSize:9,background:"#f0fdf4",color:"#166534",borderRadius:3,padding:"1px 5px",fontFamily:F.sans}}>分析</span>}
                  {n.layer3&&<span style={{fontSize:9,background:"#fff7e6",color:"#92400e",borderRadius:3,padding:"1px 5px",fontFamily:F.sans}}>対話</span>}
                </span>
              </div>
              <h3 style={{margin:"0 0 5px",fontSize:15,color:"#1a3a6b",lineHeight:1.5,fontWeight:800}}>{n.title}</h3>
              <p style={{margin:0,fontSize:12,color:"#555",lineHeight:1.7,fontFamily:F.sans}}>{n.summary}</p>
            </div>
            <div style={{background:"#f4f7fb",padding:"8px 17px",fontSize:12,color:"#1a3a6b",fontFamily:F.sans,fontWeight:700,display:"flex",justifyContent:"flex-end"}}>詳細を読む →</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:"center",padding:"16px 16px 40px",borderTop:"1px solid #dce4f0"}}>
        <p style={{fontSize:12,color:"#888",fontFamily:F.sans,lineHeight:2.0,margin:0}}>
          本ページは203号室　鈴木章三郎が個人の立場から公開情報に基づき作成したものです。<br/>
          管理組合の公式見解ではありません。内容の判断は各組合員にお委ねします。<br/>
          <span style={{fontSize:11,color:"#bbb"}}>第三者への共有・転載はご遠慮ください。</span>
        </p>
      </div>
    </div>
  );
}

// ── メインアプリ ──
function App(){
  const [phase,setPhase]=useState("top");
  const [notices,setNotices]=useState(INITIAL_NOTICES);
  const [sel,setSel]=useState(null);
  const [edit,setEdit]=useState(null);
  const [isNew,setIsNew]=useState(false);
  const [stats,setStats]=useState(null);

  const doMemberLogin=()=>{const s=recordLogin();setStats(s);setPhase("board");};
  const doAdminLogin=()=>{setStats(loadStats());setPhase("admin");};
  const doView=(id,title)=>{recordArticle(String(id),title);setStats(loadStats());};
  const blank=()=>({id:Date.now(),category:"お知らせ",categoryColor:"#1a3a6b",pinned:false,date:new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"}),title:"",summary:"",layer1:"",layer2:"",layer3:"",tag:"組合員の権利",attachments:[]});

  if(phase==="top")       return <TopScreen onMember={()=>setPhase("pinMember")} onAdmin={()=>setPhase("pinAdmin")}/>;
  if(phase==="pinMember") return <PinScreen mode="member" onSuccess={doMemberLogin} onBack={()=>setPhase("top")}/>;
  if(phase==="pinAdmin")  return <PinScreen mode="admin"  onSuccess={doAdminLogin}  onBack={()=>setPhase("top")}/>;
  if(phase==="board")     return <BoardScreen notices={notices} stats={stats} onSelect={n=>{setSel(n);setPhase("detail");}} onLogout={()=>setPhase("top")}/>;
  if(phase==="detail"&&sel) return <DetailScreen notice={sel} onView={doView} onBack={()=>setPhase("board")}/>;
  if(phase==="admin")     return <AdminScreen notices={notices} stats={stats}
    onNew={()=>{setEdit(blank());setIsNew(true);setPhase("adminEdit");}}
    onEdit={n=>{setEdit({...n,layer1:n.layer1||"",layer2:n.layer2||"",layer3:n.layer3||"",attachments:n.attachments||[]});setIsNew(false);setPhase("adminEdit");}}
    onTogglePin={id=>setNotices(p=>p.map(n=>n.id===id?{...n,pinned:!n.pinned}:n))}
    onDelete={id=>setNotices(p=>p.filter(n=>n.id!==id))}
    onLogout={()=>setPhase("top")}/>;
  if(phase==="adminEdit"&&edit) return <AdminEditScreen notice={edit} isNew={isNew}
    onSave={s=>{setNotices(p=>isNew?[s,...p]:p.map(n=>n.id===s.id?s:n));setPhase("admin");}}
    onCancel={()=>setPhase("admin")}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
