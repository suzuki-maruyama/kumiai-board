let state={
  phase:"top",
  pin:["","","",""],
  pinError:false,
  mode:"member",
  selected:null,
  tab:"layer1",
  stats:{total:0,today:0,lastDate:"",byArticle:{}},
  reactions:{}
};

function loadData(){
  try{
    const s=localStorage.getItem("kumiai-stats");
    if(s)state.stats=JSON.parse(s);
    const r=localStorage.getItem("kumiai-rxn");
    if(r)state.reactions=JSON.parse(r);
  }catch(e){}
}

function saveData(){
  try{
    localStorage.setItem("kumiai-stats",JSON.stringify(state.stats));
    localStorage.setItem("kumiai-rxn",JSON.stringify(state.reactions));
  }catch(e){}
}

function recordLogin(){
  const today=new Date().toLocaleDateString("ja-JP");
  state.stats.total=(state.stats.total||0)+1;
  if(state.stats.lastDate!==today){state.stats.today=0;state.stats.lastDate=today;}
  state.stats.today=(state.stats.today||0)+1;
  saveData();
}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(children){
    if(typeof children==="string")e.textContent=children;
    else if(Array.isArray(children))children.forEach(c=>{if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});
    else e.appendChild(children);
  }
  return e;
}

function div(style,children){return el("div",{style},children);}

function renderPin(){
  const isAdmin=state.mode==="admin";
  const wrapper=div({minHeight:"100vh",background:"#f4f7fb",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",fontFamily:F.serif},[]);
  const backBtn=el("button",{class:"btn",style:{position:"absolute",top:"20px",left:"20px",background:"white",border:"2px solid #1a3a6b",color:"#1a3a6b",borderRadius:"10px",padding:"10px 18px",fontSize:"15px",fontFamily:F.sans},onClick:()=>{state.phase="top";render();}},"← 戻る");
  const card=div({width:"100%",maxWidth:"360px",background:"white",borderRadius:"18px",padding:"36px 28px",boxShadow:"0 4px 32px rgba(0,0,0,0.10)",textAlign:"center"},[
    div({width:"52px",height:"52px",borderRadius:"50%",background:"#eef3fb",border:"3px solid #1a3a6b",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:"22px"},isAdmin?"🔑":"🔒"),
    el("div",{style:{fontSize:"20px",fontWeight:"bold",color:"#1a3a6b",marginBottom:"8px"}},isAdmin?"管理者ログイン":"暗証番号を入力"),
    el("div",{style:{fontSize:"14px",color:"#555",fontFamily:F.sans,marginBottom:"24px",lineHeight:"1.7"}},"4桁の暗証番号を入力してください"),
  ]);

  const pinRow=div({display:"flex",gap:"12px",justifyContent:"center",marginBottom:"16px"},[]);
  state.pin.forEach((d,i)=>{
    const input=el("input",{type:"tel",maxlength:"1",value:d,id:"pin"+i,style:{
      width:"56px",height:"68px",textAlign:"center",fontSize:"28px",fontWeight:"bold",
      fontFamily:"monospace",borderRadius:"10px",
      background:d?"#eef3fb":"#f5f5f5",
      border:state.pinError?"3px solid #b91c1c":d?"3px solid #1a3a6b":"3px solid #d0d0d0",
      color:"#1a3a6b"
    }});
    input.addEventListener("input",e=>{
      const v=e.target.value.replace(/[^0-9]/g,"").slice(-1);
      state.pin[i]=v;
      e.target.value=v;
      if(v&&i<3)document.getElementById("pin"+(i+1))?.focus();
      if(state.pin.every(x=>x!=="")){
        const entered=state.pin.join("");
        const ok=(state.mode==="member"&&entered===MEMBER_PIN)||(state.mode==="admin"&&entered===ADMIN_PIN);
        if(ok){
          state.pinError=false;
          if(state.mode==="member"){recordLogin();state.phase="board";}
          else{state.phase="admin";}
          setTimeout(render,200);
        }else{
          state.pinError=true;
          setTimeout(()=>{state.pin=["","","",""];state.pinError=false;render();setTimeout(()=>document.getElementById("pin0")?.focus(),100);},700);
          render();
        }
      }
    });
    input.addEventListener("keydown",e=>{if(e.key==="Backspace"&&!state.pin[i]&&i>0)document.getElementById("pin"+(i-1))?.focus();});
    pinRow.appendChild(input);
  });
  card.appendChild(pinRow);

  if(state.pinError){
    card.appendChild(div({marginTop:"12px",padding:"10px 14px",background:"#fef2f2",border:"2px solid #b91c1c",borderRadius:"10px",color:"#b91c1c",fontSize:"14px",fontFamily:F.sans},"暗証番号が違います。もう一度お試しください。"));
  }
  card.appendChild(div({marginTop:"18px",padding:"10px",background:"#f4f7fb",borderRadius:"8px",fontSize:"13px",color:"#666",fontFamily:F.sans},[
    document.createTextNode("デモ用PIN："),
    el("strong",{style:{color:"#1a3a6b"}},isAdmin?"9999":"2039"),
  ]));

  wrapper.appendChild(backBtn);
  wrapper.appendChild(card);
  return wrapper;
}

  wrapper.appendChild(list);

  const foot=div({textAlign:"center",padding:"14px 16px 40px",borderTop:"1px solid #dce4f0"},[
    el("p",{style:{fontSize:"11px",color:"#888",fontFamily:F.sans,lineHeight:"1.9",margin:"0"}},"本ページは203号室　鈴木章三郎が個人の立場から公開情報に基づき作成したものです。\n管理組合の公式見解ではありません。"),
  ]);
  wrapper.appendChild(foot);
  return wrapper;
}

function renderDetail(){
  const n=state.selected;
  const wrapper=div({minHeight:"100vh",background:"#f4f7fb",fontFamily:F.serif},[]);

  const hdr=div({background:"#1a3a6b",padding:"12px 16px",display:"flex",alignItems:"center",gap:"10px"},[
    el("button",{class:"btn",style:{background:"white",border:"none",color:"#1a3a6b",borderRadius:"7px",padding:"8px 14px",fontSize:"13px",fontFamily:F.sans},onClick:()=>{state.phase="board";render();}},"← 一覧へ"),
    el("span",{style:{color:"#c8dcf4",fontSize:"12px",fontFamily:F.sans}},"シティハウス円山北3条"),
  ]);
  wrapper.appendChild(hdr);

  const body=div({padding:"16px",maxWidth:"680px",margin:"0 auto"},[]);

  // タグ
  const tags=div({display:"flex",alignItems:"center",gap:"7px",marginBottom:"10px",flexWrap:"wrap"},[
    el("span",{style:{background:n.color,color:"white",fontSize:"12px",fontWeight:"bold",padding:"3px 10px",borderRadius:"4px",fontFamily:F.sans}},n.category),
    n.pinned?el("span",{style:{background:"#fff7e6",border:"1px solid #d97706",color:"#92400e",fontSize:"11px",fontWeight:"bold",padding:"2px 7px",borderRadius:"4px",fontFamily:F.sans}},"📌 重要"):null,
    el("span",{style:{fontSize:"12px",color:"#555",fontFamily:F.sans}},n.date),
    el("span",{style:{fontSize:"11px",color:"#777",fontFamily:F.sans,marginLeft:"auto"}},n.tag),
  ]);
  body.appendChild(tags);
  body.appendChild(el("h1",{style:{fontSize:"17px",color:"#1a3a6b",margin:"0 0 14px",lineHeight:"1.6",fontWeight:"bold"}},n.title));

  // タブ
  const tabs=[
    {key:"layer1",label:"📋 事実",color:"#1a3a6b",bg:"#eef3fb"},
    {key:"layer2",label:"🔍 分析（私見）",color:"#166534",bg:"#f0fdf4"},
    {key:"layer3",label:"💬 問いかけ",color:"#92400e",bg:"#fff7e6"},
  ];
  const tabRow=div({display:"flex",borderRadius:"10px 10px 0 0",overflow:"hidden",border:"1px solid #dce4f0",borderBottom:"none"},[]);
  tabs.forEach((t,i)=>{
    const btn=el("button",{class:"btn",style:{
      flex:"1",padding:"9px 3px",border:"none",
      fontSize:"11px",fontFamily:F.sans,lineHeight:"1.4",
      fontWeight:state.tab===t.key?"bold":"normal",
      background:state.tab===t.key?t.bg:"#f4f7fb",
      color:state.tab===t.key?t.color:"#888",
      borderRight:i<2?"1px solid #dce4f0":"none",
      borderBottom:state.tab===t.key?"2px solid "+t.color:"2px solid transparent",
      cursor:"pointer",
    }},t.label);
    btn.addEventListener("click",()=>{state.tab=t.key;render();});
    tabRow.appendChild(btn);
  });
  body.appendChild(tabRow);

  const ct=tabs.find(t=>t.key===state.tab);
  const content=div({background:ct.bg,border:"1px solid #dce4f0",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"16px",marginBottom:"14px"},[]);

  if(state.tab==="layer2"){
    content.appendChild(div({background:"#dcfce7",border:"1px solid #16a34a",borderRadius:"7px",padding:"7px 11px",marginBottom:"12px",fontSize:"11px",color:"#166534",fontFamily:F.sans,lineHeight:"1.7"},"⚠ 以下は203号室　鈴木章三郎の個人的な分析・見解です。判断は各組合員にお委ねします。"));
  }

  if(state.tab==="layer3"){
    // 関心度バロメーター
    const rxnKey=n.id+"-int";
    const intCount=state.reactions[rxnKey]||0;
    const MAX=63;
    const intBox=div({background:"white",border:"2px solid #1a3a6b",borderRadius:"10px",padding:"14px",marginBottom:"14px"},[
      el("div",{style:{fontSize:"14px",fontWeight:"bold",color:"#1a3a6b",fontFamily:F.sans,marginBottom:"8px"}},"🌡️ この問題への関心度"),
      div({display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"},[
        el("div",{style:{fontSize:"11px",color:"#888",fontFamily:F.sans}},"関心がある方はボタンを押してください（匿名）"),
        el("div",{style:{textAlign:"center"}},[
          el("div",{style:{fontSize:"26px",fontWeight:"bold",color:"#1a3a6b",fontFamily:F.sans,lineHeight:"1"}},String(intCount)),
          el("div",{style:{fontSize:"10px",color:"#888",fontFamily:F.sans}},"/"+MAX+"戸"),
        ]),
      ]),
      div({height:"14px",background:"#eee",borderRadius:"7px",overflow:"hidden",marginBottom:"10px"}},[
        div({height:"100%",width:Math.min(intCount/MAX*100,100)+"%",background:"linear-gradient(90deg,#1a3a6b,#3a6abf)",borderRadius:"7px",transition:"width 0.5s"},[]),
      ]),
    ]);
    const intBtn=el("button",{class:"btn",style:{width:"100%",padding:"10px",borderRadius:"8px",border:"none",background:state.reactions[rxnKey+"_voted"]?"#e0e7ef":"#1a3a6b",color:state.reactions[rxnKey+"_voted"]?"#888":"white",fontSize:"14px",fontFamily:F.sans,cursor:state.reactions[rxnKey+"_voted"]?"default":"pointer"}},state.reactions[rxnKey+"_voted"]?"✓ 関心を表明しました":"👆 この問題に関心があります");
    if(!state.reactions[rxnKey+"_voted"]){
      intBtn.addEventListener("click",()=>{
        state.reactions[rxnKey]=(state.reactions[rxnKey]||0)+1;
        state.reactions[rxnKey+"_voted"]=true;
        saveData();render();
      });
    }
    intBox.appendChild(intBtn);
    content.appendChild(intBox);

    // 問いかけ
    const questions=n.layer3.split("\n").filter(l=>/^[①②③④⑤]/.test(l.trim()));
    questions.forEach((q,qi)=>{
      const qKey=n.id+"-q"+qi;
      const qData=state.reactions[qKey]||{yes:0,no:0,unsure:0,comments:[]};
      const tot=(qData.yes||0)+(qData.no||0)+(qData.unsure||0);
      const myVote=state.reactions[qKey+"_voted"];

      const qBox=div({background:"white",border:"2px solid #fde68a",borderRadius:"10px",padding:"14px",marginBottom:"12px"},[
        el("p",{style:{margin:"0 0 12px",fontSize:"14px",color:"#1a3a6b",fontWeight:"bold",lineHeight:"1.7"}},q),
      ]);

      const voteRow=div({display:"flex",gap:"6px",marginBottom:"10px"},[]);
      [{type:"yes",label:"👍 そう思う",ac:"#1a3a6b",li:"#eef3fb"},
       {type:"no",label:"👎 思わない",ac:"#b91c1c",li:"#fef2f2"},
       {type:"unsure",label:"🤔 わからない",ac:"#6b7280",li:"#f3f4f6"}].forEach(({type,label,ac,li})=>{
        const cnt=qData[type]||0;
        const pct=tot>0?Math.round(cnt/tot*100):0;
        const btn=el("button",{class:"btn",style:{flex:"1",padding:"8px 3px",borderRadius:"7px",border:"2px solid "+(myVote===type?ac:"#e0e0e0"),background:myVote===type?ac:li,color:myVote===type?"white":"#444",fontSize:"12px",fontFamily:F.sans,lineHeight:"1.4",cursor:myVote?"default":"pointer"}},label+"\n"+cnt+(tot>0?" ("+pct+"%)":""));
        if(!myVote){
          btn.addEventListener("click",()=>{
            if(!state.reactions[qKey])state.reactions[qKey]={yes:0,no:0,unsure:0,comments:[]};
            state.reactions[qKey][type]=(state.reactions[qKey][type]||0)+1;
            state.reactions[qKey+"_voted"]=type;
            saveData();render();
          });
        }
        voteRow.appendChild(btn);
      });
      qBox.appendChild(voteRow);

      if(tot>0){
        const barRow=div({display:"flex",height:"5px",borderRadius:"3px",overflow:"hidden",marginBottom:"8px"},[]);
        [{k:"yes",c:"#1a3a6b"},{k:"no",c:"#b91c1c"},{k:"unsure",c:"#9ca3af"}].forEach(({k,c})=>{
          if((qData[k]||0)>0)barRow.appendChild(div({width:Math.round((qData[k]||0)/tot*100)+"%",background:c,height:"100%"},[]));
        });
        qBox.appendChild(barRow);
        qBox.appendChild(el("div",{style:{fontSize:"10px",color:"#aaa",fontFamily:F.sans,marginBottom:"10px"}},"回答数："+tot+"件"));
      }

      // コメント欄
      const cmtArea=div({borderTop:"1px solid #f0f0f0",paddingTop:"10px"},[
        el("div",{style:{fontSize:"12px",color:"#666",fontFamily:F.sans,fontWeight:"bold",marginBottom:"6px"}},"💭 コメント（任意・匿名）"),
      ]);
      const voted=state.reactions[qKey+"_commented"];
      if(!voted){
        const inp=el("input",{type:"text",placeholder:"ご意見をご記入ください",style:{width:"calc(100% - 70px)",padding:"8px 10px",border:"1px solid #ddd",borderRadius:"7px 0 0 7px",fontSize:"13px",color:"#333",display:"inline-block"}});
        const sendBtn=el("button",{class:"btn",style:{width:"66px",padding:"8px",background:"#d97706",border:"none",borderRadius:"0 7px 7px 0",color:"white",fontSize:"13px",fontFamily:F.sans,display:"inline-block"},onClick:()=>{
          const t=inp.value.trim();
          if(!t)return;
          if(!state.reactions[qKey])state.reactions[qKey]={yes:0,no:0,unsure:0,comments:[]};
          state.reactions[qKey].comments.push({text:t,time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})});
          state.reactions[qKey+"_commented"]=true;
          saveData();render();
        }},"送信");
        cmtArea.appendChild(div({display:"flex"},[inp,sendBtn]));
      }else{
        cmtArea.appendChild(div({padding:"7px 10px",background:"#fff7e6",borderRadius:"7px",fontSize:"13px",color:"#92400e",fontFamily:F.sans},"✓ コメントを送信しました"));
      }
      const cmts=qData.comments||[];
      if(cmts.length>0){
        cmts.forEach(c=>{
          cmtArea.appendChild(div({background:"#f8f8f8",borderRadius:"7px",padding:"7px 10px",marginTop:"6px",fontSize:"13px",color:"#444",fontFamily:F.sans,lineHeight:"1.7"},[
            el("span",{style:{fontSize:"10px",color:"#bbb",display:"block",marginBottom:"2px"}},c.time+"　匿名"),
            document.createTextNode(c.text),
          ]));
        });
      }
      qBox.appendChild(cmtArea);
      content.appendChild(qBox);
    });
  }else{
    el("p",{style:{margin:"0",lineHeight:"2.1",fontSize:"15px",color:"#222",whiteSpace:"pre-line"}},n[state.tab]||"");
    const p=el("p",{style:{margin:"0",lineHeight:"2.1",fontSize:"15px",color:"#222",whiteSpace:"pre-line"}},n[state.tab]||"");
    content.appendChild(p);
  }

  body.appendChild(content);
  body.appendChild(div({padding:"11px 13px",background:"#eef3fb",borderRadius:"8px",borderLeft:"4px solid #1a3a6b"},[
    el("p",{style:{margin:"0",fontSize:"12px",color:"#1a3a6b",fontFamily:F.sans,lineHeight:"1.8",fontWeight:"bold"}},"📌 本ページは203号室　鈴木章三郎（個人）が公開情報に基づき作成したものです。管理組合の公式見解ではありません。"),
  ]));
  wrapper.appendChild(body);
  return wrapper;
}

    div({background:"#1a252f",padding:"14px 18px",display:"flex",alignItems:"center",gap:"10px"},[
      el("button",{class:"btn",style:{background:"white",border:"none",color:"#1a252f",borderRadius:"7px",padding:"9px 16px",fontSize:"14px",fontFamily:F.sans},onClick:()=>{state.phase="top";render();}},"← ログアウト"),
      el("span",{style:{color:"white",fontSize:"16px",fontFamily:F.sans,fontWeight:"bold"}},"🔑 管理者ダッシュボード"),

      ]),
      div({background:"#fffbeb",border:"2px solid #f59e0b",borderRadius:"10px",padding:"14px",fontSize:"14px",fontFamily:F.sans,color:"#78350f"},"⚠ 管理者モードです。現在のバージョンではアプリ内での編集はできません。お知らせの追加・変更はClaudeにご依頼ください。"),
    ]),
  ]);
}

function render(){
  const app=document.getElementById("app");
  while(app.firstChild)app.removeChild(app.firstChild);

  let content;
  if(state.phase==="top")content=renderTop();
  else if(state.phase==="top"&&(state.mode==="member"||state.mode==="admin"))content=renderPin();
  else if(state.mode==="member"&&state.phase==="top"||state.mode==="admin"&&state.phase==="top")content=renderPin();

  if(!state.phase||state.phase==="top"){
    if(state.pin&&document.getElementById("pin0"))content=renderPin();
    else content=renderTop();
  }

  switch(state.phase){
    case"top":content=renderTop();break;
    case"pin":content=renderPin();break;
    case"board":content=renderBoard();break;
    case"detail":content=renderDetail();break;
    case"admin":content=renderAdmin();break;
    default:content=renderTop();
  }

  // ボタンクリック後のphase設定
  app.appendChild(content);

  if(state.phase==="pin"){
    setTimeout(()=>document.getElementById("pin0")?.focus(),100);
  }
}

// ボタンクリックでphaseを変更
document.addEventListener("click",e=>{
  const btn=e.target.closest("[data-phase]");
  if(btn){state.phase=btn.dataset.phase;render();}
});

// topのボタン修正
const origRenderTop=renderTop;

loadData();
state.phase="top";
render();
</script>
