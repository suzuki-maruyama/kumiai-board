var NOTICES=[{id:1,category:"重要",color:"#b91c1c",pinned:true,date:"2026年6月27日",tag:"総会・理事会",title:"重要事項説明会・第21期定期総会　審議要旨",summary:"重要事項説明会および第21期定期総会の審議要旨。各議案の論点・発言・採決結果を簡潔にまとめたもの。",layer1:"≪重要事項説明会 審議要旨≫\n\n本説明会は、マンション管理適正化法第72条に基づき、管理委託契約の更新にあたって管理会社（住友不動産建物サービス）が主催したものである。開会前、203号室の鈴木組合員から、説明会の進め方についての異議申し立てがあった。重要事項説明書類は2週間前に配布されたのみで、総会開始の15分前から15分間という時間設定では実質的な説明とは言えず、見積書や契約書案も提示されていないとして、説明会の中止を求めた。鈴木は、契約変更点についての質疑応答は総会議案の審議の場ではなく、その前段階で管理会社が責任をもって行うべきだとも主張した。\n\n管理会社はこの申し入れには応じず、予定どおり説明会を開始した。管理業務主任者の加藤が免許証番号を提示したうえで、重要事項14項目および契約変更点7項目について説明を行った。\n\n説明終了後、鈴木はあらためて、契約変更点の質疑応答を総会議案の審議の中で行うのは手続き上の区分として不適切であり、契約書・見積書を含めた事前の質疑応答がなければ本変更を受け入れる手続きにはならないと申し入れた。\n\n────────────────────　　　\n\n≪第21期定期総会　審議要旨≫\n\n第1号議案　管理規約一部改定の件\n\n第1号議案は、2026年4月1日に施行された改正区分所有法に対応するための管理規約の一部改定である。管理会社からは、総会の成立要件、特別決議の要件、総会召集手続き、バリアフリー改修等の決議要件緩和、建替え決議の要件緩和などについて説明があった。\n\n後藤組合員は、議案の説明を管理会社ではなく理事会が行うべきだと指摘した。鈴木は、議決後に直ちに効力が発生するという説明は誤りであり理事会での執行決議が必要であること、法改正への対応は必須ではないこと、議決権要件緩和の趣旨説明が不十分であることなどを指摘した。議長は、総会の出席・議決権行使の無反応者が一定割合存在する実情を踏まえ、要件緩和が必要であると説明した。採決の結果、第1号議案は特別決議の要件を満たし、承認された。\n\n────────────────────\n\n第2号議案　掲示板使用催促規則制定の件\n\n第2号議案は、無断で掲示物が掲示されている状況を踏まえ、理事会が掲示板の使用や無断掲示物の撤去・処分を行うための規則を制定するものである。弁護士の助言を受けて作成されたとの説明があった。\n\n鈴木は、自身による投書の掲示を念頭に置いた規則であるとの理解を示しつつ、弁護士が関与したことをもって規則の適正性を裏付ける根拠にはならないと主張し、掲示板は組合員のものであり、一方的な制限・撤去は行き過ぎであると述べた。栗山組合員からは、賛同する意見が出された。議長は、鈴木からの大量の投函物への対応に苦慮している実情を説明した。採決の結果、第2号議案は賛成多数で承認された。\n\n────────────────────\n\n第3号議案　第21期事業報告及び管理費等収支決算報告の件\n\n第3号議案では、第21期の事業報告、管理会計・灯油会計・修繕積立金会計の決算報告、監査報告が扱われた。管理会社からは、定期点検、共用部分補修、保険、各会計の収支、未収金、灯油会計のマイナス要因、修繕積立金会計の繰越額などが説明された。\n\n鈴木は、事業報告が定型業務の記載にとどまり、裁判対応、顧問弁護士による代理回答、投書対応など、第21期に発生した重要事項が記載されていないと指摘した。また、管理会社が議案書案を作成しているのであれば、理事会がどのように精査・修正・議論して総会に上程したのかを説明すべきだと述べた。\n\nさらに、決算報告については、支出項目の分類が分かりにくく、管理会社の直接業務、管理会社の再委託業務、管理組合の直接委託業務、その他経費に整理すべきだと指摘した。後藤組合員からも、管理費会計に積み上がった剰余金の扱いや、支出内容を分かりやすくする必要性について意見が出された。\n\n監査報告については、鈴木から、監査内容が抽象的であり、会計監査だけでなく業務監査、特に裁判対応や顧問弁護士回答のような重要事項についても確認されているのか不明であるとの指摘があった。\n\n────────────────────\n\n第4号議案　管理委託契約の一部変更及び管理委託費改定の件\n\n第4号議案では、管理委託契約の更新と、管理委託費の月額増額が審議された。管理会社からは、現行の管理委託費が月額税別87万7,940円であり、更新後は月額税別92万2,040円となること、月額税別4万4,100円、年間約53万円の増額になることが説明された。\n\n増額理由として、管理員・清掃員の人件費上昇、最低賃金上昇、社会保険制度改正、人材不足、協力会社からの値上げ要請などが挙げられた。また、管理員勤務時間を1時間短縮すれば増額幅を抑える案もあったが、理事会はサービス低下や管理員のモチベーション低下を懸念し、現行条件での更新を提案した。\n\n鈴木は、管理会社の説明が重要事項説明会ではなく総会議案審議の中で行われていること、見積書や内訳資料が示されていないため値上げの妥当性を判断できないこと、管理員勤務時間短縮案の検討が不十分であること、相見積もりによる客観的比較が必要であることを指摘した。後藤組合員からも、今後は管理会社との契約内容や他社比較を検討すべきとの意見が出された。一方、浅田組合員からは、理事会が代表として検討した結果であれば、それに従うという意見も出された。\n\n────────────────────\n\n第5号議案　定期預金口座新設及び資金移動の件\n\n第5号議案は、決済性預金として保有していた資金の一部を、格付けの高い銀行（三菱UFJ・北海道銀行）に5年定期で分散して預け入れるものである。\n\n鈴木は、金利上昇局面においては5年の固定よりも短期の定期預金を組み合わせる方が合理的であり、格付けにこだわらず信用金庫等も含めて利率の良い先を探すべきだと主張した。議長は、預金金利が上昇するインセンティブは銀行側に乏しいこと、元本保全の観点から一定の格付け・1,000万円以内という基準を設けたことを説明し、状況が変われば見直す前提であるとした。採決の結果、賛成多数で承認された。\n\n────────────────────\n\n第6号議案　マンションすまい・る債購入の件\n\n第6号議案は、住宅金融支援機構が発行するマンション管理組合専用の債券「マンションすまい・る債」を1,000万円購入するものである。第5号議案と同様、余剰資金の分散運用の一環として提案された。\n\n鈴木は、議案書の記載だけでは、大規模修繕までの間に中途解約する前提であることや、保有期間が長いほど利回りが上がる仕組みであることが理解できず、説明が不十分であると指摘した。議長及び加藤からの補足により、6年目に中途解約した場合の実質利回りが0.96％程度であることが説明された。採決の結果、賛成多数で承認された。\n\n────────────────────\n\n第7号議案　宅配ボックス制御系部品更新工事実施の件\n\n第7号議案は、宅配ボックスの制御系部品について、製造終了が見込まれることを理由に、予防保全として更新工事を行うものである。金額は税込114万9,500円。\n\n鈴木は、一社見積もりであることの妥当性に疑問を呈し、参考見積もりを含めた比較検討を求めた。後藤組合員からも、故障してから対応する選択肢との比較について質問が出された。議長及び加藤は、部品の生産終了状況や予防保全の必要性について説明した。採決の結果、賛成多数で承認された。\n\n────────────────────\n\n第8号議案　自動ドア装置更新工事実施の件\n\n第8号議案は、正面玄関に設置された自動ドア4枚のうち、外側・内側各1枚（合計2枚）について、経年劣化を理由に更新工事を行うものである。金額は税込89万1,000円。\n\n鈴木は、対応可能なメーカーが1社に限られている点の特殊性、見積書の宛先が管理会社になっている点について、業界慣行を踏まえた懸念を示した。採決の結果、賛成多数で承認された。\n\n────────────────────\n\n第9号議案　マンション顧問弁護士委託契約更新の件\n\n第9号議案では、顧問弁護士契約の更新と、顧問料の増額が審議された。現在の顧問料は月額税込2万2,000円であり、来年3月から月額税込5万5,000円への改定が提案された。\n\n議長は、鈴木からの多数の投書、法律的主張、民事調停、訴訟対応により、理事長や理事会の負担が非常に大きくなっていると説明した。また、投書を弁護士に送り、弁護士とやり取りし、回答案を確認していること、対応に年間約150時間を要したこと、次期理事会の負担軽減のためにも顧問弁護士が必要であると述べた。\n\n鈴木は、顧問弁護士の本来の役割は理事会への助言であり、組合員への代理回答は契約上当然に含まれるものではないと指摘した。投書の多くは法律問題ではなく、管理組合運営、規約運用、資料開示、議案説明に関するものであり、まず理事会と管理会社フロントが対応すべきだと述べた。また、顧問弁護士に丸投げすることで費用が増え、それを理由に顧問料を倍以上に増額するのは不適切だと主張した。\n\n議長は、鈴木が話し合いを求めながら民事調停を申し立てたことに不信感を持ったこと、投書対応に強い精神的負担を感じたこと、AIの回答は質問者に寄り添う傾向があり危険だと感じていることも述べた。鈴木は、民事調停は訴訟とは異なり、話し合いの延長上にある手続であると説明した。\n\n────────────────────\n\n第10号議案　第22期事業計画案及び管理費等収支予算案の件\n\n第10号議案では、第22期事業計画案と管理費等収支予算案が審議された。管理会社からは、自動ドア装置更新、宅配ボックス制御ユニット更新、消防関係設備更新、消火器及び連結送水装置更新などが事業計画に盛り込まれていることが説明された。管理会計では、管理費収入等を含めた収入約1,907万円、支出約1,981万円、当期発生剰余金マイナス約77万円が見込まれた。灯油会計は収支同額、修繕積立金会計では収入約2,829万円、支出約204万円、次期繰越剰余金約8,564万円が見込まれた。\n\n鈴木は、第22期事業計画に、管理規約改正の継続審議や長期修繕計画上の積み残し業務について、どのような体制で取り組むのかが明記されていないと指摘した。また、南側歩道沿いの生垣の冬季寒冷紗養生、ロードヒーティングボイラー更新後の保守点検、連結送水管送水マップの不鮮明な表示など、以前から指摘している課題が未解決であると述べた。\n\nさらに、管理費会計に剰余金がある中で、管理委託費値上げをそのまま受け入れるのではなく、当面は剰余金で補填し、その間に他社相見積もりを取るなど、管理委託費の適正性を検証すべきだと主張した。議長は、相見積もりについては、3年から5年に1回程度、次期理事会で検討するよう申し送りたいと述べた。\n\n────────────────────\n\n総括的整理\n\n重要事項説明会及び第1号議案から第10号議案までの審議を通じて、共通して浮かび上がった主な論点は、次のとおりである。\n\n1　手続きの区分（重要事項説明と総会議案審議） 重要事項の説明や契約変更点の質疑応答は、本来は総会議案審議の場ではなく、その前段階で管理会社が責任をもって行うべきものであり、両者を混同した進行は手続き上の問題があるとの指摘があった。\n\n2　理事会主体の説明と管理会社主体の説明の区別 総会議案は管理組合の議案であり、管理会社が実務支援を行うとしても、最終的には理事会が主体的に説明し、責任を持つべきであるとの問題が提起された。\n\n3　議案書・事業報告・決算報告の分かりやすさ 定型的な点検や収支数値だけでなく、その期に発生した重要事項、裁判対応、顧問弁護士回答、理事会の判断経過、積み残し課題などを記録し、次期理事会や組合員に分かる形で残す必要があるとの指摘があった。\n\n4　費用支出の内訳と透明性 管理委託費、弁護士費用、再委託費、管理組合直接委託費などについて、支出項目が分かりにくいとの指摘があり、組合員が費用の内容を確認できるよう、分類と表示方法の改善が求められた。\n\n5　顧問弁護士利用の範囲 顧問弁護士は理事会への助言者なのか、組合員への代理回答者なのか、その業務範囲が不明確であるとの問題が提起された。代理回答業務を顧問契約に含めるのであれば、契約内容や費用根拠を明確にすべきであるとの指摘があった。\n\n6　管理委託費・顧問料・各種工事費の増額根拠 管理委託費や顧問弁護士料、設備更新工事費の増額について、値上げ理由そのものには一定の理解可能性がある一方で、見積書、内訳、時間数、業務範囲、他社比較、代替案などが十分に示されていないとの問題があった。\n\n7　相見積もり・価格検証の必要性 管理委託費及び各種更新工事については、定期的に他社見積もりを取得し、現在の価格が適正か検証することが必要であるとの意見が出され、次期理事会への申し送り事項とされた。\n\n8　積み残し課題の事業計画化 管理規約改正の継続審議、長期修繕計画上の未処理事項、生垣養生、ロードヒーティング保守、連結送水管送水マップなど、これまで指摘されてきた課題について、第22期事業計画に具体的な体制やスケジュールが記載されていないとの指摘があった。\n\n以上",layer2:"",layer3:""},{id:2,category:"重要",color:"#b91c1c",pinned:true,date:"2026年6月27日",tag:"総会・理事会",title:"重要事項説明会・第21期定期総会　発言記録（全文）",summary:"重要事項説明会および第21期定期総会における発言者別の発言記録の全文。発言の趣旨を踏まえわかりやすく記録。",layer1:"重要事項説明会・第21期定期総会　発言記録\n\n作成趣旨： 本書面は、第21期定期総会に先立つ重要事項説明会、開会前のやり取り、及び第1号議案から第10号議案までの審議内容について、文字起こしの内容をもとに、発言の趣旨が分かるよう口語で整理したものである。原発言の逐語録ではなく、聞き取り誤りと思われる箇所を補い、第三者が読んでも審議の流れと争点が理解できるように、地の文と発言を交えて整理した。発言者は、元の文字起こしにおける話者番号にあわせて表示している（Speaker 1＝鈴木、Speaker 2＝浅田、Speaker 3＝監事、Speaker 4＝議長・皿谷理事長、Speaker 5＝管理会社・加藤、Speaker 6＝後藤、Speaker 7＝栗山）。\n\n────────────────────\n\n重要事項説明会　発言記録\n\n【要点】\n\n本説明会は、マンション管理適正化法第72条に基づき、管理委託契約の更新にあたって管理会社（住友不動産建物サービス）が主催したものである。開会前、203号室の鈴木組合員（Speaker 1）から、説明会の進め方についての異議申し立てがあった。重要事項説明書類は2週間前に配布されたのみで、総会開始の15分前から15分間という時間設定では実質的な説明とは言えず、見積書や契約書案も提示されていないとして、説明会の中止を求めた。鈴木は、契約変更点についての質疑応答は総会議案の審議の場ではなく、その前段階で管理会社が責任をもって行うべきだとも主張した。\n\n管理会社（Speaker 5＝加藤）はこの申し入れには応じず、予定どおり説明会を開始した。管理業務主任者の加藤が免許証番号を提示したうえで、重要事項14項目および契約変更点7項目について説明を行った。\n\n説明終了後、鈴木はあらためて、契約変更点の質疑応答を総会議案の審議の中で行うのは手続き上の区分として不適切であり、契約書・見積書を含めた事前の質疑応答がなければ本変更を受け入れる手続きにはならないと申し入れた。\n\n定刻に先立ち、203号室の鈴木（Speaker 1）は、管理会社の加藤（Speaker 5）に対して発言の機会を求めた。今日の説明会はあくまで管理会社が主体となって行うものであり、組合の総会とは切り離された、管理会社の責任のもとで実施されるものだという理解を確認したうえで、鈴木は次のように述べた。\n\n【Speaker 1／鈴木】 重要事項説明の書類だけを2週間前に配布し、総会開始の15分前から始めて15分で終わらせるというやり方は、どう考えても手続き上不適切です。今日の説明会は、いったん中止していただきたいというのが私の申し入れです。\n\nこれに対し、加藤はいったん意見として受け止めたものの、中止には応じない姿勢を示した。\n\n【Speaker 5／管理会社・加藤】 ご意見としては承りますが、中止にするつもりはありません。説明会が始まりましたら、あらためてご意見をうかがいます。\n\n13時30分、管理会社の加藤（Speaker 5）が重要事項説明会の開会を告げ、出席者に対し、重要事項説明会の開催案内と議案書26ページの用意を求めた。これに対し、鈴木（Speaker 1）はあらためて開会前に発言の時間を求め、説明会の進め方そのものについて、より踏み込んだ異議を述べた。\n\n【Speaker 1／鈴木】 これは管理会社の主催であって、組合の主催ではありません。管理会社に委託しているマンションの住民として、その意見を皆さんの前で聞いていただきたいと思います。委託を受けている管理会社が、委託元の住民からの要望を拒否するというのはまずいのではないでしょうか。拒否されるなら、はっきりそうおっしゃってください。\n\n例年、管理費値上げの際にはこうした形で説明が行われてきたようですが、調べてみると、総会開始15分前から始まり、重要事項の書類だけを示して質疑を受け付けない、というのが従来のやり方です。しかし、これはどう考えてもおかしい。一般的な重要事項説明であれば、見積書も契約書案もない状態で行われることはあり得ません。今日出席していない組合員は、この説明だけでは何も理解できないでしょう。本来であれば、説明のポイントを記した書面を重要事項説明書類と一緒に配布すべきであり、それもなされていない以上、このやり方は不適切であり、まず中止を申し入れます。\n\nあわせて、理事会に対しても、こうした不十分な説明をもとに審議を進めることは不適切であるとして、値上げ議案の取り下げを要望します。仮にこのまま強行されるのであれば、現時点でそれを阻止することは難しいため進めていただくことになりますが、この経緯については所轄官庁である開発局の担当部署に報告し、是正を求めていきます。\n\n加藤は、進行を続けることを表明し、説明会を開始した。\n\n【Speaker 5／管理会社・加藤】 進めさせていただきます。重要事項の説明会を開催いたします。\n\n加藤は、重要事項の説明はマンション管理業務主任者の資格を持つ者が行うこととされていることを述べ、自身が管理業務主任者として登録番号「第130-63370号」を有していることを示し、免許証の確認を求めた。\n\n【Speaker 1／鈴木】 免許証は、組合員一人ひとりに見せて回るのが本来の手続きのはずです。一般的にもそのように行われていると承知しています。それを行わないのはまずいのではないでしょうか。説明会開催の前提条件ですから、きちんとやってください。なお、管理会社の主催ですので、理事会は今は関係ありません。\n\n加藤は出席者に免許証を提示して回り、確認を得たうえで説明に入った。\n\n≪重要事項14項目の説明≫\n\n管理業務主任者・加藤（Speaker 5）から、議案書に沿って次のとおり重要事項の説明が行われた。\n\n管理業者の照合については、住友不動産建物サービス株式会社の主たる事務所の住所、代表者氏名（岡本和也）、登録番号・登録年月日（国土交通大臣第030-0805号、令和4年2月24日）が示された。管理業務主任者と登録番号については、すでに説明済みである旨が確認された。\n\n管理事務を管轄する事務所は札幌事業所であること、今回の契約は方針として契約条件の変更であること、管理事務の対象となるマンション（シティハウス丸山北3条）の所在地・対象部分は、議案書記載のとおりであることが説明された。\n\n管理事務の内容及び実施方法（議案書8ページ）については、機関事務とそれ以外の管理事務に分かれること、法第76条に基づく管理方法は法定管理規則第87条第2項第1号の方法によることが示され、フロー図（議案書3ページ）を用いて補足された。管理事務に要する費用は税抜き合計92万2,040円、消費税9万2,204円、合計101万4,244円であり、内訳は議案書8ページの委託費月額内訳のとおりとされた。\n\nこのほか、管理事務の一部再委託、保証契約、免責事項、契約期間（2026年7月1日から2027年6月30日まで）、契約の更新・解除・解約の申し出、法第79条に規定する書類の閲覧方法についても、議案書記載のとおり順次説明された。\n\n≪契約変更点7項目の説明（議案書26ページ）≫\n\n加藤（Speaker 5）は、議案書26ページに記載された「主な変更事項」として、次の7点を説明した。今回の変更は管理会社の業務実態や国土交通省の標準管理委託契約書の改定内容に合わせた整理が中心であり、管理組合の権限を制限したり、サービス内容を大幅に削減したりするものではないとの説明があった。\n\n【Speaker 5／管理会社・加藤】 1つ目は、請求書・領収書等のペーパーレス化です。従来は紙での発行も行っていましたが、今回の改定では原則として電子的方法による提供に変更します。近年のペーパーレス化の流れと、国土交通省の標準管理委託契約書の改定内容に合わせたものです。\n\n2つ目は、理事会・総会支援業務の時間目安です。会議1回あたりの目安時間を2時間程度とし、夜22時以降は担当者が退席する場合があることを明記します。働き方改革や労働法令への対応によるもので、通常の理事会や総会が深夜に及ぶことは少なく、実務上大きな影響はないと考えています。\n\n3つ目は、点検結果等の報告主体の明確化です。従来は誰が報告するかが契約書上明確でなかったため、今後は管理会社が実施した点検は管理会社から、それ以外の業者が実施した点検はその業者から報告することを明記します。責任の所在が明確になり、組合にとっても分かりやすい内容になると考えています。\n\n4つ目は、管理員の休憩時間の明確化です。休憩時間中は原則として業務対応を行わないこと、緊急対応を行った場合は別時間で調整することを明記します。休憩時間は本来、労働者が自由に休める時間であり、今回の規定は新たな制限ではなく、実態を明確にしたものです。\n\n5つ目は、緊急対応業務の範囲の明確化です。従来は表現がやや曖昧でしたが、共用設備の故障や異常が発生した際に専門業者を派遣すること、その費用が有償となる場合があることを明示します。新たに費用を請求するようになるという趣旨ではありません。\n\n6つ目は、個人情報取扱いに関する条文の見直しです。国土交通省の標準管理委託契約書の改正に伴うもので、標準契約書に準拠するための改定であり、管理会社が個人情報を自由に利用できるようになるものではありません。\n\n7つ目は、組合名簿の管理に関する実態の整備です。理事長の指示により管理会社から組合名簿を提供する流れを契約書上明文化するもので、新たな権限を与えるものではなく、実際に行っている業務を明確化したものです。あわせて、管理会社の住所変更についても反映します。\n\n加藤（Speaker 5）は、ご説明が足早になった旨をことわったうえで、重要事項の説明を終了した。質問については、続く総会の第4号議案（管理委託契約の変更）の審議のなかであらためて受け付けるとして、説明会を締めくくった。\n\n説明会終了後、鈴木（Speaker 1）はあらためて発言を求め、次のとおり申し入れた。\n\n【Speaker 1／鈴木】 重要事項の説明書類はあらかじめ2週間前に配布されていますが、その内容についての質疑応答は、本来、総会議案の審議の場で行うべきものではありません。それ以前の段階で、管理会社が責任をもって組合員に説明し、質疑を受けて回答すべき事柄です。重要事項の内容や見積もり、契約内容が変更される可能性もある以上、組合の議案審議のなかで質疑を受けるというのは、手続きの区分としてまったくおかしいと言わざるを得ません。契約書・見積書を含めた質疑応答を事前に行わなければ、この変更を受け入れる手続きにはなりません。\n\n議案書26ページの変更点をよく読めば、さまざまな疑問が出てきます。それを議案審議のなかで扱うというのは不自然であり、議決を通すためにそうしたやり方を取っているとしか理解しようがありません。変更点についてはほかにも疑義がありますが、時間の関係もあり、ここでは差し控えます。基本的に、このようなやり方は認められないということを申し入れます。\n\n（重要事項説明会　終了） （この後、定期総会の審議に移行）\n\n────────────────────\n\n第21期定期総会　発言記録\n\n総会開会に先立ち、203号室の鈴木（Speaker 1）は、管理会社の加藤に対し、本日の重要事項説明会についての申し入れを行った（上記、重要事項説明会の項を参照）。この後、開会前の時間に他の出席者からも雑談を交えたやり取りがあったが、議事に関わる実質的な内容ではなかったため、本書面では省略する。\n\n────────────────────\n\n第1号議案　管理規約一部改定の件\n\n【要点】 第1号議案は、2026年4月1日に施行された改正区分所有法に対応するための管理規約の一部改定である。管理会社からは、総会の成立要件、特別決議の要件、総会召集手続き、バリアフリー改修等の決議要件緩和、建替え決議の要件緩和などについて説明があった。\n\n後藤（Speaker 6）は、議案の説明を管理会社ではなく理事会が行うべきだと指摘した。鈴木（Speaker 1）は、議決後に直ちに効力が発生するという説明は誤りであり理事会での執行決議が必要であること、法改正への対応は必須ではないこと、議決権要件緩和の趣旨説明が不十分であることなどを指摘した。議長（Speaker 4）は、総会の出席・議決権行使の無反応者が一定割合存在する実情を踏まえ、要件緩和が必要であると説明した。採決の結果、第1号議案は特別決議の要件を満たし、承認された。\n\n議長（Speaker 4）から議案の上程があり、説明は管理会社の加藤（Speaker 5）が担当した。\n\n【Speaker 6／後藤】 この議案の説明というのは、法的に言えば、理事長・理事会の側から提案されるのが筋だと思います。ここに参加している管理会社さんは、総会の支援については、許可があれば参加できるとしても、組合員でもない立場から提案するという形は、本来のあり方ではないと思います。理事会の方からきちんと議案の説明をして、それで議決を取っていただくという、本来の形に戻すべきではないでしょうか。あまり堅く言うつもりはありませんが、本来のあり方から言えば、管理会社がこの議案の説明をするという進め方には、違和感があります。\n\n議長（Speaker 4）はこの意見を承ったうえで、引き続き加藤による説明を続けさせた。\n\n【Speaker 5／管理会社・加藤】 本件は、2026年4月1日に施行された改正区分所有法に対応するため、当マンションの管理規約の一部を改定するものです。今回の改定は、理事会独自の判断で運営ルールを大きく変更しようとするものではなく、法律改正に伴って現在の規約の一部が改正後の区分所有法に適合しなくなったため、その内容を整理し、法令に適合させることを目的としています。改正法の施行により、管理規約に記載されていても法律に反する部分は効力を持たなくなりますので、規約を改定しなければ、法律が優先されることになります。今回はそうした状態を放置せず、組合員の皆様に分かりやすく整理した形で規約に反映するために提案させていただきました。\n\n大きな変更点としては、総会の成立要件と、特別決議の議決権要件の変更があります。総会の成立については、改正前は議決権総数の半数以上で成立していましたが、改正後は過半数が必要となります。具体的には、総数が100票であれば、これまでは50票で成立していたものが、今後は51票なければ成立しません。特別決議についても、これまでは組合員総数及び議決権総数の4分の3以上を基準としていましたが、改正法では出席者の4分の3以上で決議する形になります。\n\nまた、総会の召集手続きについても変更があります。改正後は、総会の召集通知において、すべての議案について議案の要領を示すことが求められるようになりました。改正前は、管理規約の改正など特別な事項についてのみ議案の要領を示すことが求められていましたが、改正後はすべての議案についてこれが求められます。これは、組合員の皆様が事前に内容を十分把握し、適切に議決権を行使できるようにするための変更です。\n\nそのほか、緊急時に5日間まで徴収期間を短縮できるという規定がありましたが、改正法では1週間未満に短縮することが認められなくなったため、この条文を削除しています。バリアフリー化等の設備要件についても緩和があり、高齢者や障害者の利用を容易にするための改修や、供用部分の段差・基金を取り除く工事などについては、決議要件が4分の3から3分の2に緩和されています。建替え決議についても、耐震性不足や重大な安全上の問題など、法律で定める客観的な事由がある場合には、要件が5分の4から4分の3に緩和されています。以上のとおり、いずれも法律に整合させるための改正であり、組合員の皆様に新たな負担をお願いするものでも、組合の権限を拡大するものでもございません。\n\n議長（Speaker 4）は補足として、今回の改定では国土交通省の標準管理規約の改正内容をすべて反映するのではなく、当マンション特有の部分を損なわない範囲で、法律に抵触している箇所のみを第21期で修正し、残りの検討は第22期に申し送ることとした経緯を説明した。また、本議案が承認された場合、規約改定は議決後ただちに効力が発生すると述べた。\n\n【Speaker 1／鈴木】 今、理事長から、議決されればすぐに効力を発するというお話がありましたが、それは誤りです。総会で決まったとしても、それをもって理事会が執行するという議決を別途得なければならないはずです。また、説明を聞いていると、国の法改正によって管理規約を変えなければならないというニュアンスで受け取れますが、変えなくてもよいというのが私の認識です。それほど重要であれば、もっと早く臨時総会を開いてもよいはずで、緊急性はないと思います。\n\nさらに申し上げると、今日決議する内容のうち、議決権の要件を緩和するという意味合いについては、重要事項を安易に議決する方向を容認するものではなく、その背景や経緯をきちんと説明しなければ誤解を招きます。要するに、組合に関心のない組合員が多く、総会に出席せず議決権行使もしないという場合に重要事項が採決できなくなる、という事情があってこその法改正です。当組合は、議決権行使をしない組合員は少数ですから、本来その事情には当てはまらないはずです。管理会社にとっても緩めてもらった方が都合がよいので、そうした方向で説明されているように思いますが、もっと正確に、本来の目的や事情を説明しないと、誤解を招く不適切な説明になってしまいます。\n\nまた、この改定の話はずっと前から出ていたはずですが、先送りが続いています。理事長が検討してこられたことは分かりますが、今後どのように進めていくのか、来年度以降の進め方について説明していただけるならよいのですが、時期に任せるという発想では困ります。そもそも、この議案書だけを読んでも内容が分かりません。分からない原案を無理に承認させようとするような決議の進め方は、非常に不適切だと思います。\n\n議長（Speaker 4）は、前回・今回の総会いずれにおいても出欠の意思表示をしない組合員が約22％存在し、75％の議決権行使がなければ特別決議が成立しない現状を踏まえ、要件緩和が必要であると説明した。\n\n【Speaker 4／議長・皿谷理事長】 前回も今回も、適正な手続きに則って総会の出欠をお願いしているのですが、調べてみると、前回も今回も無反応の方が22％いらっしゃいます。そうなると、75％をクリアしなければ議決ができません。何もできない状態になってしまい、出席も欠席も連絡してこない方がいる一方で、出席されている方もいるという、非常に不都合な事態になっています。よそのマンションでも同様の傾向があり、無関心な方や賃貸に出される方が増えてくると、75％を超えられなくなり、何も決議できなくなります。そうした事態を避けるため、この75％のルールを変更する案については、必要な対応だと考え、理事会で皆様にお示しした次第です。\n\n【Speaker 1／鈴木】 そうであれば、その趣旨を簡潔に書けばよいはずですし、理事会の議事録にも、そうした議論をしたという記載がありません。分かりにくい資料のままでは判断できません。管理会社が作成したものをベースにそのまま使うのは、よくないと思います。\n\n採決の結果、出席・委任状・議決権行使書による議決権数のうち、特別決議の要件（3/4以上）を満たしたため、第1号議案は承認された。\n\n────────────────────\n\n第2号議案　掲示板使用催促規則制定の件\n\n【要点】 第2号議案は、無断で掲示物が掲示されている状況を踏まえ、理事会が掲示板の使用や無断掲示物の撤去・処分を行うための規則を制定するものである。弁護士の助言を受けて作成されたとの説明があった。\n\n鈴木（Speaker 1）は、自身による投書の掲示を念頭に置いた規則であるとの理解を示しつつ、弁護士が関与したことをもって規則の適正性を裏付ける根拠にはならないと主張し、掲示板は組合員のものであり、一方的な制限・撤去は行き過ぎであると述べた。栗山組合員（Speaker 7）からは、賛同する意見が出された。議長（Speaker 4）は、鈴木からの大量の投函物への対応に苦慮している実情を説明した。採決の結果、第2号議案は賛成多数で承認された。\n\n議案の説明は加藤（Speaker 5）が行った。\n\n【Speaker 5／管理会社・加藤】 今回の規則は、無断で使用している居住者が見受けられる状況を踏まえ、理事会が当該行為の是正及び無断掲示物の撤去・処分等を適切に行うことができるよう、対策を制定する必要があると判断したものです。弁護士に案の作成を依頼し、本規則として提案いたします。\n\n内容は全5条から構成されています。第1条で本規則の目的、掲示板の適正な管理及び使用を定めています。第2条では、掲示板は共用部分であり、その管理権限は管理組合に帰属することを明確にしています。管理運営は理事長が行い、必要に応じて管理会社等に委任できる内容となっています。第3条では、掲示板を使用できるのは管理組合に限ると明記しています。これは居住者の発言を制限する趣旨ではなく、管理組合への要望や意見はこれまでどおり意見書等で行っていただくという前提で、掲示板を誰でも自由に利用できる状態にはしないという趣旨です。\n\n第4条では、無断掲示物への対応を定めています。管理組合の許可なく掲示された掲示物は無断掲示物として扱い、管理組合は共用部分の管理権限に基づき、事前通告なしで撤去できることを明文化しています。この点について、強すぎるのではないかというご意見もあるかと思いますが、理事会では弁護士に相談し、掲示板が共用部分である以上、管理組合が適正な管理を行うために必要な範囲の内容であるとの助言を受け、この内容としています。撤去した掲示物についても、ただちに廃棄するものではなく、合理的な期間保管し、提示者から返還の申し出があれば返還する仕組みとしています。\n\n【Speaker 1／鈴木】 弁護士に作成を依頼したという説明がありましたが、弁護士が作成したからといって、それで適正だということにはなりません。弁護士は、法に抵触することが明らかでないという程度のことを言っているに過ぎないはずです。そのような言葉を用いて組合員に誤解を生じさせるようなことがあってはいけないと思います。\n\n秩序維持を掲げていますが、これは端的に言えば、私がいろいろ掲示していることを指しているのだと思います。私は秩序を壊すような内容を掲示しているつもりはありませんし、そのような意図もありません。掲示板は組合員のものであり、理事会の意向で一方的に制限したり撤去したりするのは、明らかに行き過ぎだと思います。公序良俗や一般的な関心といった理由で検閲的なルールを設けるのであれば、これは制定しても無効だと解釈します。仮に可決されても、この規則は無効だという認識のもとで、これまでどおり掲示物の掲示を続けたいと思います。黙って撤去することはやめていただきたいです。\n\n栗山（Speaker 7、705号室）からは、掲示板は住民個人の見解を出すものではなく、運営にあたっての最低限の共有事項を載せるべき場であるとの意見が出され、規則に賛同する旨が述べられた。\n\n【Speaker 4／議長・皿谷理事長】 理事長として一年間の経験から申し上げますと、203号室の方から、組合員向け・理事会向けともに、頻繁に大量の投函があります。同じ内容を掲示板にも貼られるのですが、これは意味がないということを申し上げています。投函を控えてほしいとお願いしているにもかかわらず、迷惑をしているというのが実態です。弁護士にも相談していますが、ポストへの投函自体は理事会として関与できないため、個別に申し出をしていただくという話になっており、改めて皆様にお伝えします。\n\n採決の結果、第2号議案は賛成多数（反対1名）で承認された。\n\n────────────────────\n\n第3号議案　第21期事業報告及び管理費等収支決算報告の件\n\n【要点】 第3号議案では、第21期の事業報告、管理会計・灯油会計・修繕積立金会計の決算報告、監査報告が扱われた。管理会社からは、定期点検、共用部分補修、保険、各会計の収支、未収金、灯油会計のマイナス要因、修繕積立金会計の繰越額などが説明された。\n\n鈴木（Speaker 1）は、事業報告が定型業務の記載にとどまり、裁判対応、顧問弁護士による代理回答、投書対応など、第21期に発生した重要事項が記載されていないと指摘した。また、管理会社が議案書案を作成しているのであれば、理事会がどのように精査・修正・議論して総会に上程したのかを説明すべきだと述べた。\n\nさらに、決算報告については、支出項目の分類が分かりにくく、管理会社の直接業務、管理会社の再委託業務、管理組合の直接委託業務、その他経費に整理すべきだと指摘した。後藤（Speaker 6）からも、管理費会計に積み上がった剰余金の扱いや、支出内容を分かりやすくする必要性について意見が出された。\n\n監査報告については、鈴木から、監査内容が抽象的であり、会計監査だけでなく業務監査、特に裁判対応や顧問弁護士回答のような重要事項についても確認されているのか不明であるとの指摘があった。\n\n【Speaker 4／議長・皿谷理事長】 それでは、第3号議案に入ります。第3号議案は、第21期事業報告及び管理費等収支決算報告の件です。管理会社から説明をお願いします。\n\n【Speaker 5／管理会社・加藤】 ありがとうございます。議案書の8ページをご覧ください。まず、第21期の事業報告です。8ページ上段には、今期実施した各種点検項目を記載しています。中段には、その他事業報告として、共用部分の補修申請に関する事項を記載しています。また、現在加入している損害保険の内容も記載しています。\n\n次に、9ページをご覧ください。決算報告の概要を記載しています。未収金については、決算期時点で6万1,540円の未収がありましたが、現時点ではすべて回収済みです。\n\n決算報告の詳細については、11ページから説明します。まず、管理会計です。管理費収入、駐車場使用料収入などを含めた収入合計は、1,887万461円です。支出については、管理委託費、清掃費、各種費用などを含め、支出合計は1,867万1,690円です。その結果、当期剰余金は19万8,771円の黒字となりました。前期繰越剰余金を含めた次期繰越剰余金は、463万3,446円となります。管理会計については、水道光熱費などで、役員の皆様がロードヒーティングのシステム確認を持ち回りで行っていただいたこともあり、予算よりも支出が大幅に減額されています。13ページ、14ページには、収入支出の明細書を添付しています。\n\n続いて、15ページの灯油会計について説明します。当期の収入合計は750万4,326円、支出合計は832万5,056円で、当期剰余金はマイナス82万730円となりました。その結果、次期繰越剰余金はマイナス61万5,262円となっています。灯油会計がマイナスになった主な理由は、過年度の未払い灯油代が判明し、今回それを適正に処理したためです。本来であれば過去に支払うべき費用でしたが、今期に処理したため、一時的に支出が増えました。また、灯油会計は、住民の皆様への請求時期と業者への支払い時期に差があるため、年度末時点では繰越剰余金がマイナスになる場合があります。なお、地下タンクには灯油が残っていますので、その分は帳簿上には直接表れていない点もあります。16ページに貸借対照表、17ページに財産目録を添付しています。\n\n次に、18ページの修繕積立金会計について説明します。修繕積立金、駐車場使用料、資産運用益などを含めた収入合計は2,051万8,417円です。支出については、すでに実施されたインターホン更新工事や、総会で承認いただいた工事などを実施しており、支出合計は1,669万3,920円です。その結果、当期剰余金は382万4,497円となりました。前期繰越金を含めた次期繰越金は5,939万2,942円となります。20ページには貸借対照表、21ページには財産目録、22ページには決算期における預金残高証明書を添付しています。23ページには、黒田監事からいただいた監査報告書を添付しています。以上、私からの説明です。\n\n【Speaker 1／鈴木】 203号室の鈴木です。まず確認ですが、第3号議案は、事業報告、決算報告、そして監査報告の3つを含む議案という理解でよろしいでしょうか。それから、本来このような議案説明は、管理会社ではなく、理事会から説明するのが適切ではないでしょうか。議案書の原案は管理会社が作成したものと思われますが、それを理事会がどのように確認し、精査し、修正し、議論したうえで総会に上程したのか、その説明が必要だと思います。\n\nまず、事業報告について申し上げます。今回の事業報告には、定期点検や検査など、毎年行われる定型業務だけが記載されています。しかし、第21期には、通常とは異なる重要な出来事がありました。たとえば、裁判への対応、私の投書に対する顧問弁護士名義の代理回答などです。ところが、そのような重要事案について、事業報告には全く記載がありません。\n\n理事会議事録にも十分な記載がなく、総会議案書の事業報告にも記録がなければ、次期理事会へどのように引き継ぐのでしょうか。半数の理事が留任するので当面は分かるかもしれませんが、しばらく経ってから「この件はどうだったのか」となったとき、記録がなければ分からなくなるのではないでしょうか。裁判になった場合にも、こうした記録は重要な証拠になります。以前、皿谷理事長は、引き継ぎは理事会議事録で行うという趣旨のことをおっしゃっていましたが、現在の理事会議事録は、そのような引き継ぎ資料にはなっていないと思います。まして、総会の事業報告にも、裁判や顧問弁護士回答などの重要事項が記載されていないのであれば、事業報告として不十分です。管理会社が議案書の草案を作っているのであれば、こうした重要事項も事業報告に記載するよう支援すべきではないでしょうか。管理会社には、そこまで支援する役割があると思います。まず、21期の事業報告については、その点を指摘します。\n\n【Speaker 4／議長・皿谷理事長】 事業報告について、私から申し上げます。裁判については、鈴木さんから21期理事会に対していろいろな意見や訴えがありました。いずれにしても、その裁判については棄却されたということを、組合員の皆様には報告していると思います。\n\n【Speaker 1／鈴木】 報告としては足りないと思います。\n\n【Speaker 4／議長・皿谷理事長】 裁判については、地方裁判所の件もありました。話がややこしかったため、弁護士に依頼することにしました。その際は、総会で決議をいただき、弁護士を選任して裁判対応を行いました。もう一つ、修繕積立金が不服だから返還を求めるという趣旨の裁判もありました。金額としては5万円程度の請求だったと思いますが、それについては簡易裁判所で、私が一人で対応しました。弁護士に依頼すると何十万円もかかってしまうため、その裁判については弁護士には依頼しない方がよいと判断しました。その結果についても、先週、皆様に裁判結果が確定したことを報告したと思います。\n\n弁護士費用については、議案書を見れば分かります。14ページの雑費の欄に、訴訟対応の着手金や弁護士費用として、2025年12月24日、2026年3月22日に支出したものが記載されています。合計で80万円ほどが管理費から支払われています。これについては、臨時総会で決議をいただいていますので、手続上は問題ないと考えています。裁判対応が事業報告に記載すべきほど重要かどうかについては、私の判断としては、そこまで重要ではないと考えています。すでに皆様に報告済みですので、以上です。なお、決算の数字を修正する、あるいは変更するということはありません。この数字どおりで問題ないと考えています。\n\n【Speaker 1／鈴木】 決算については、後ほど質問します。今は事業報告の話をしています。事業報告で問題なのは、顧問弁護士による代理回答についてです。私からの投書が多かったという話は今ありましたが、それに対して、すべて顧問弁護士に代理回答させていることが問題です。顧問弁護士の契約内容は、本来は理事会への助言であって、組合員への代理回答ではないと思います。その点を私は指摘してきましたが、理事会から十分な反論や説明はありません。これは重要な問題です。しかも、後ほどの議案では、顧問弁護士費用が倍以上に増額されることになっています。私がここで言っているのは、金額の問題そのものではなく、第21期の事業報告において、私の投書への対応や、顧問弁護士に代理回答させたこと、理事会がどのように苦慮したのか、どのように対応したのかを報告すべきだったということです。これは重要事項です。報告が必要ないとは思えません。その点について、事業報告として不適切だと指摘します。\n\n議長（Speaker 4）が他に意見・質問を募ったところ、後藤（Speaker 6、1001号室）から発言があった。\n\n【Speaker 6／後藤】 前期に、管理費会計の見える化を図るため、駐車場使用料は修繕積立金会計に入れることにしました。ただ、それまで駐車場使用料を管理費会計に入れてきたことで、管理費会計には400万円以上の剰余金が積み上がっています。この剰余金については、いつまでもそのままにせず、いずれ修繕積立金会計へ移すことも検討してはどうでしょうか。今すぐやれという意味ではありませんが、次期以降で検討すべきだと思います。\n\n【Speaker 4／議長・皿谷理事長】 その点については、私も少し気になっていました。管理費会計に400万円程度の剰余金があることが十分なのかどうか、まだ判断がつかない部分もあります。ただ、今後さらに剰余金が積み上がるようであれば、管理費の徴収額を見直す、あるいは一定程度赤字予算として管理費を圧縮し、剰余金を減らすという方法も考えられると思います。基本的には組合員の財産ですので、今後どう扱うかは次期以降で検討していただければよいと思います。\n\n【Speaker 6／後藤】 管理費会計に剰余金があることで、管理費をいろいろ使っても大丈夫だという感覚になってしまってはいけないと思います。やはり、このお金は修繕積立金会計へ移す方向で考えるべきではないかと思います。\n\n【Speaker 1／鈴木】 私も賛成です。先ほど申し上げたように、事業報告については、重要事項や特別な出来事が記載されていない点が不適切だと思います。\n\n次に、収支決算報告について申し上げます。今回の決算報告は数字が記載されていますが、まず各会計の概要や総括を、冒頭に分かりやすく示すべきだと思います。また、後藤さんが指摘されたように、管理費会計の剰余金を今後どのように扱うのかについても、検討課題として記載すべきです。管理費会計に剰余金があるからといって、弁護士費用などに安易に使ってよいということになってはいけません。\n\nさらに、支出項目の記載が非常に分かりづらいです。私は以前から、決算書の支出項目を整理してほしいと要望してきました。大きく分けると、次の4つに分類できるはずです。1つ目は、管理会社が直接行う業務。2つ目は、管理会社が再委託している業務。3つ目は、管理組合が直接委託している業務。たとえば、後藤さんの時期に消防設備点検を管理組合の直接契約に変更したと思います。4つ目は、その他の経費です。\n\nこのように分類すれば、管理会社に支払っている費用、管理会社が再委託している費用、管理組合が直接支払っている費用、その他経費が分かりやすくなるはずです。ところが、現在の決算書では、管理委託費、エレベーター点検、機械式駐車場点検、清掃業務などが十分に分けて表示されていません。細かい経費は羅列されているのに、重要な委託業務の内訳は分かりにくいままです。以前、管理会社に確認したところ、システム上できないという説明がありました。しかし、管理会社のシステムの都合で、組合員に分かりやすい決算書が作れないというのは、本末転倒ではないでしょうか。エクセルで整理すれば、支出明細を分類し直すことはできるはずです。なぜ対応しないのか、管理会社から説明していただきたいです。\n\n【Speaker 5／管理会社・加藤】 決算報告書の表記を変えてほしいというご要望だと思います。ただ、決算書を作成している担当部署と、私のように総会で説明する担当者は別です。作成者が違う理由は、不正防止のためです。私が勝手にエクセルで作り変えることはできますが、それが本当に信頼できる資料かという問題があります。お金を扱っている部署と、現場で説明する担当者を分けることで、正確性を保つ仕組みになっています。\n\n【Speaker 1／鈴木】 その説明では納得できません。やれるかどうかの話ではなく、組合員に分かりやすく示すべきだという話です。\n\n【Speaker 6／後藤】 関連して申し上げます。私も、鈴木さんの肩を持つという意味ではありませんが、決算書を分かりやすくしてほしいという要望は、無理な要求ではないと思います。組合員のお金がどのように使われているのか、きちんと分かるようにしてもらう必要があります。私自身も、現在の資料を見ても分かりにくい部分がかなりあります。いちいち文句を言うかどうかの違いはありますが、分かりやすくしてほしいという要望自体はもっともだと思います。\n\n【Speaker 1／鈴木】 もう一つ申し上げます。訴訟費用や弁護士費用を「雑費」という項目に入れていることには違和感があります。このような重要な支出を雑費に入れると、隠そうとしているのではないかと疑われても仕方ありません。これは不適切だと思いますので、やめていただきたいです。\n\nそれから、消防設備点検について確認します。消防設備点検は、現在、管理組合の直接契約になっているという理解でよろしいでしょうか。決算書では、どこに記載されていますか。\n\n【Speaker 5／管理会社・加藤】 11ページの「保守料」の中の消防設備点検に記載されています。\n\n【Speaker 1／鈴木】 つまり、これは管理組合の直接委託業務ということですね。だからこそ、こうした項目は「管理組合の直接委託業務」として分けて表示してほしいということです。先ほどの要望はその趣旨です。\n\n【Speaker 5／管理会社・加藤】 ご意見として承ります。引き続き検討します。\n\n【Speaker 1／鈴木】 検討するだけでは困ります。これまでも、できないという説明で終わっています。できないでは済まないので、きちんと考えてください。その結果を報告してください。私はこの件を2年ほど前から指摘しています。それにもかかわらず改善されていないのは、不誠実だと思います。今回も、あらかじめこの指摘があることが分かっていたはずです。それなら、本日の説明の中で、理事長又は管理会社から、なぜ対応できていないのか、どう改善するのかを説明すべきでした。黙っていればそのまま通るというような進め方は望ましくありません。具体的な分類については、これまで書面でも出しています。ただ、今後あらためて分かりやすく整理して出すこともできます。\n\n【Speaker 6／後藤】 分かりやすくするという意味では、まず管理会社が直接行っている業務と、外部に再委託している業務、管理組合が直接契約している業務くらいは分けて表示してもよいと思います。これは、使ったお金の内訳を出すだけですから、無理な要求ではないと思います。システム上できないのであれば、別紙で出せばよいのではないでしょうか。\n\n【Speaker 4／議長・皿谷理事長】 たとえば、現在の費用項目の中で、管理組合が直接支払っているものがどれなのか分かるようにすればよい、ということでしょうか。\n\n【Speaker 1／鈴木】 いえ、それだけでは不十分です。\n\n【Speaker 6／後藤】 植栽管理費なども、実際にどういう形で関わっているのか分かりにくいです。外注しているのか、管理会社が直接やっているのか、そういう点が見えるように整理してほしいということです。消防設備点検のように、管理組合が直接契約しているものもあります。そういう仕分けをきちんと整理してほしいということです。\n\n【Speaker 1／鈴木】 補足します。私が事前に配布したA4表裏2枚の資料の1ページ目右下に、その分類を整理しています。大きく4つに分けてほしいということです。1つ目は、管理会社の直接業務。2つ目は、管理会社が再委託している業務。たとえば植栽などがこれにあたると思います。3つ目は、管理組合が直接委託している業務。現在でいえば、消防設備点検が該当します。4つ目は、その他の経費です。さらに、2つ目の再委託業務については、細目を出してほしいです。重要事項説明書には内訳が記載されていますが、あちらは月額表示で、決算書は年額表示なので比較しにくいです。そのあたりも分かるように、記載を工夫していただきたいです。\n\n【Speaker 4／議長・皿谷理事長】 ご意見として承りました。ありがとうございます。ほかに質問はありますか。なければ採決に入ります。\n\n【Speaker 1／鈴木】 すみません。監査報告については、採決の前に報告しないのですか。第3号議案に含まれているのであれば、監査報告をしてから採決すべきではないでしょうか。\n\n【Speaker 5／管理会社・加藤】 例年どおり、第3号議案の中に監査報告を含めています。\n\n【Speaker 1／鈴木】 例年どおりかどうかではなく、第3号議案に含まれているなら、監査報告をしてから採決する必要があるのではないですか。\n\n【Speaker 4／議長・皿谷理事長】 それでは、監査報告をお願いします。\n\n【Speaker 3／監事】 監査報告書を添付しておりますが、収支報告書、貸借対照表、財産目録等の概要を確認し、適切に処理されていることを確認しました。\n\n【Speaker 1／鈴木】 ありがとうございます。監査報告についても申し上げます。例年、A4用紙1枚程度の監査報告が添付されていますが、内容が抽象的すぎると思います。監査の具体的なプロセスも不透明です。また、裁判対応のような重大事案についての言及もありません。適正と判断した根拠も明確ではありません。\n\n監事の方が理事会に出席し、尽力されていることは承知しています。しかし、会計監査だけでなく、業務監査についても、どこまで内容を把握しているのでしょうか。裁判の内容、私の投書の内容、それに対する顧問弁護士の回答内容なども確認したうえで、監査報告をしているのでしょうか。もし確認していないのであれば、すべて適正であるとは言いにくいのではないでしょうか。一部については確認していないが、確認した範囲では適正である、という書き方なら分かります。しかし、全体を確認して不正がないかのような監査報告に見えるのは問題です。\n\n監査は、理事会と同じ立場で追認するものではなく、組合員の利益のために理事会運営をチェックする重要な役割です。その役割を十分に果たしていないような監査報告では、意味がないと思います。なお、事業報告と監査報告は、厳密には決議事項ではなく報告事項ではないかと思います。議決が必要なのは、主として決算報告の承認ではないでしょうか。今後は、報告事項と決議事項を区別して、適切に整理していただきたいと思います。管理会社としても、プロとしてその点をきちんと認識して進行していただきたいです。以上です。\n\n採決の結果、第3号議案（決算報告の承認）は承認された。\n\n────────────────────\n\n第4号議案　管理委託契約の一部変更及び管理委託費改定の件\n\n【要点】 第4号議案では、管理委託契約の更新と、管理委託費の月額増額が審議された。管理会社からは、現行の管理委託費が月額税別87万7,940円であり、更新後は月額税別92万2,040円となること、月額税別4万4,100円、年間約53万円の増額になることが説明された。\n\n増額理由として、管理員・清掃員の人件費上昇、最低賃金上昇、社会保険制度改正、人材不足、協力会社からの値上げ要請などが挙げられた。また、管理員勤務時間を1時間短縮すれば増額幅を抑える案もあったが、理事会はサービス低下や管理員のモチベーション低下を懸念し、現行条件での更新を提案した。\n\n鈴木（Speaker 1）は、管理会社の説明が重要事項説明会ではなく総会議案審議の中で行われていること、見積書や内訳資料が示されていないため値上げの妥当性を判断できないこと、管理員勤務時間短縮案の検討が不十分であること、相見積もりによる客観的比較が必要であることを指摘した。後藤（Speaker 6）からも、今後は管理会社との契約内容や他社比較を検討すべきとの意見が出された。一方、浅田（Speaker 2）からは、理事会が代表として検討した結果であれば、それに従うという意見も出された。\n\n【Speaker 4／議長・皿谷理事長】 それでは、第4号議案に入ります。第4号議案は、管理委託契約の一部変更及び管理委託費改定の件です。現在の管理委託契約は、令和8年6月30日までの契約となっています。今回、管理委託契約の更新と、管理委託費の改定について提案するものです。先ほどの重要事項説明でも管理会社から説明がありましたが、改めて本議案として審議をお願いします。\n\n【Speaker 5／管理会社・加藤】 ありがとうございます。それでは、今回の改定内容について説明します。議案書24ページをご覧ください。現在の管理委託費は、月額税別87万7,940円です。更新後は、月額税別92万2,040円とする提案です。増額は、月額税別4万4,100円です。年間では、約53万3,000円の増額となります。\n\n内訳としては、事務管理業務費が月額1万200円の増額、管理員業務費が月額1万9,800円の増額、清掃業務費が月額1万円の増額、建物設備管理料が月額4,100円の増額です。\n\n今回、値上げをお願いする主な理由は、人件費の上昇です。管理員や清掃員の人件費は、最低賃金の上昇により年々上がっています。また、社会保険制度の改正などもあり、以前と同じ条件で人材を確保することが難しくなっています。さらに、人材不足も深刻です。全国的にマンション管理員が不足しており、管理員が見つからないため、勤務日数を減らしたり、管理体制を縮小したりするマンションも増えています。管理会社としても、人材確保のための採用費用や処遇改善が必要となっており、その分のコストが上がっています。また、協力会社からも値上げ要請が出ています。外観点検やスカイボックス関係の業務についても、値上げの要請がありました。\n\nただし、理事会としても、管理会社の言われるままに受け入れたわけではありません。なるべくコストを下げる方法も検討しました。管理会社からは、管理員の勤務時間を毎日1時間短縮する案も提案しました。その場合、サービスの質をできるだけ落とさない形で、値上げ額を本来の月額4万4,100円から月額9,400円程度に抑えることができる案でした。理事会では、この2つの案を検討しました。その結果、管理員のモチベーションへの影響、管理の質の低下、居住者サービスへの影響などを踏まえ、現行と同じ勤務条件のまま更新する方が妥当であると判断されました。また、他社から正式な見積もりを取ったわけではありませんが、同規模・同程度の勤務時間の他マンションの管理委託費水準、戸当たり単価、時間単価なども参考にして、当マンションの金額が妥当な範囲にあると判断しています。説明が少し足早になりましたが、本議案についてご承認をお願いします。\n\n【Speaker 4／議長・皿谷理事長】 少し補足します。このマンションができた21年前は、最低賃金が600円くらいでした。当時は、その金額でも管理員や清掃員の方を確保できました。しかし、今は最低賃金が1,070円程度まで上がっています。実際には、1,070円ではなかなか人が来ません。1,100円程度でも、なかなか十分な人材を確保するのは難しい状況です。場合によっては、1,800円や2,000円くらいでなければ人が集まらないという状況もあります。以前は、55歳で定年退職した方が、その後も元気に働くというケースがありました。しかし、今は60歳、65歳まで働く人が増え、再雇用も進んでいます。そのため、管理員や清掃員として働く人を確保することが非常に難しくなっています。\n\n私自身も、前期から理事会に関わってきた中で、管理会社からの費用請求が多いと感じることもありました。そのため、三井、三菱、地元のデベロッパー系管理会社なども含め、いろいろ調べました。ただ、管理会社を乗り換えるとなると、実際には2年程度かかると言われました。かなり大変な作業になります。また、乗り換えたとしても、人材が確保できなければ管理業務をしてくれる人が集まらないという問題があります。\n\n当マンションでも高齢化が進み、年金で生活されている方も増えてきています。管理費負担が重くなることは、非常に苦しいことだと思います。その中で、清掃時間を減らす、管理員の勤務時間を減らすなど、理事会でも検討しました。しかし、勤務時間を減らすことで、働いている人が十分な収入を得られなくなり、辞めてしまう可能性があります。そうなると、同じ金額で代わりの人を確保することが難しくなります。結果として、管理の質が下がり、マンションの資産価値にも影響する可能性があります。今回の管理委託費の値上げについては、私としても十分検討しましたが、世の中の流れとしてやむを得ない面があると考えています。私の仕事の関係でも、委託先から値上げを求められ、それを断った結果、別の業者を探すと、かえって大幅に高くなるということがあります。そういう意味でも、現在は非常に厳しい状況だと認識しています。\n\n【Speaker 1／鈴木】 203号室の鈴木です。まず、この第4号議案について、管理会社が説明し、その後に皿谷理事長が補足するという形になっていますが、本来は理事会が議案の趣旨を説明すべきではないでしょうか。今後は、管理会社の説明に頼る形を改める必要があると思います。また、管理会社が今説明した内容は、本来はこの議案審議の場ではなく、先ほどの重要事項説明の場で、管理会社として説明すべき内容だと思います。管理会社の経営状況、人材確保の難しさ、値上げの理由、契約内容の変更点などは、重要事項説明として説明し、質疑を受けるべき内容です。その点を区別していただきたいです。\n\nそのうえで質問します。議案書25ページには、戸当たり単価や時間単価が記載されています。しかし、これは実際に管理員や清掃員に支払われる時間単価ではなく、管理会社の経費や利益も含まれているはずです。そうであれば、その内訳、つまり管理員や清掃員の処遇改善にどの程度充てられるのか、管理会社の経費や利益がどの程度含まれているのかが分かる見積書が必要だと思います。見積書がなければ、処遇改善のための値上げなのか、管理会社の利益確保のための値上げなのか、組合員には分かりません。単価だけ示されても、その信頼性を判断できません。\n\n【Speaker 4／議長・皿谷理事長】 それは無理ではないでしょうか。見積書を出すというのは、なかなか難しいと思います。\n\n【Speaker 1／鈴木】 無理ではないと思います。一般的には、契約金額を上げるのであれば、見積書を出してもらうのは適切だと思います。また、理事会議事録を見ると、管理会社から管理員の勤務時間を1時間減らす提案が出され、それに対して理事会が、管理員のモチベーションが下がる、サービスの質が下がると判断して採用しなかったように読めます。しかし、それは実際に本人に聞いてみないと分からないのではないでしょうか。管理員の方は、1時間早く帰れることを喜ぶかもしれません。特に、以前は土曜日勤務がなくなった分、月曜日から金曜日の勤務時間を1時間ずつ延ばした経緯があると思います。もともとは16時までで十分に業務ができていたのではないでしょうか。理事会が、十分な調査もせず、管理員本人とも十分に話さず、机上の議論だけで勤務時間を維持する判断をしたのであれば、それは理事会の裁量を超えているのではないかと思います。組合費は打ち出の小槌ではありません。費用削減も考えながら、慎重に判断すべきです。\n\n【Speaker 4／議長・皿谷理事長】 人を雇う場合、時給だけではなく、トータルでいくらもらえるのかも重要です。6時間勤務と7時間勤務では、収入が違います。\n\n【Speaker 1／鈴木】 だからこそ、本人に確認しなければ分からないのではないですか。理事会が勝手に決めつけているように見えます。\n\n【Speaker 5／管理会社・加藤】 管理員の中山さんとは話をしています。本人としては、できれば長く働きたいという意欲があります。一方で、物価上昇によって組合員の費用負担が増えることも理解されています。そのため、1時間程度の短縮であれば、我慢できますという話はいただいていました。そこで、1時間短縮案を提案しました。ただし、2時間の短縮となると、清掃時間が削られますし、中山さんとしても、2時間減るのであれば退職するか、別の物件に移りたいという話がありました。そのため、最大でも1時間短縮という案を提案したものです。\n\n【Speaker 1／鈴木】 それなら、1時間短縮でよいのではないですか。\n\n【Speaker 6／後藤】 今の説明は、管理員さんが1時間ならよいと言ったから1時間短縮すればよい、という話ではないと思います。まず、当マンションとして、現在の管理員勤務体制が適切なのかどうかを検討する必要があります。管理員さんが1時間短縮を受け入れるかどうかだけで判断する話ではありません。今の勤務体制が本当に必要なのか、管理組合としてどう考えるのかを整理する必要があります。管理委託費は、ここ数年連続して上がってきています。世の中の状況を考えれば、一定程度理解できる面もありますが、あまりにも上がり続けるのであれば、一度、管理会社との契約そのものを見直す必要もあると思います。他にも管理会社はあるわけですから、今後は管理会社との契約内容を改めて詰め直すことも必要ではないでしょうか。今この場で結論を出せということではありませんが、今後のあり方としては、そういう検討が必要だと思います。\n\n【Speaker 2／浅田】 805号室の浅田です。理事会や監事の方々が話し合って、管理員の勤務時間も含めて、いろいろな条件を考えたうえで、この案を受け入れると判断されたのだと思います。私たちは、理事会の方々を代表として選んでいます。理事会がいろいろ検討したうえで、この案がよいと判断したのであれば、私はそれに従いたいと思います。今さら、管理員さんの意向を聞けとか、管理会社を変えてもよいのではないかという話をここでするのは、少し違うのではないかと思います。\n\n【Speaker 1／鈴木】 やはり、管理委託費については、一度、他社から見積もりを取るべきだと思います。確か10年ほど前、永田さんが理事長だった時に、他社から相見積もりを取り、その結果をもとに住友不動産建物サービスと交渉して、当時、年間100万円以上の管理委託費を減額したことがあったと思います。それは、客観的な比較資料があったからこそ、管理会社も交渉に応じたのだと思います。住友不動産建物サービスとの契約を直ちにやめるという意味ではありません。ただ、3年に1度、あるいは5年に1度程度は、管理委託費が適正な価格なのかを確認するため、他社見積もりを取ることが重要だと思います。この点は、次年度理事会への申し送り事項として引き継いでいただきたいと思います。\n\n採決の結果、第4号議案は賛成多数で承認された。\n\n────────────────────\n\n第5号議案　定期預金口座新設及び資金移動の件\n\n【要点】 第5号議案は、決済性預金として保有していた資金の一部を、格付けの高い銀行（三菱UFJ・北海道銀行）に5年定期で分散して預け入れるものである。\n\n鈴木（Speaker 1）は、金利上昇局面においては5年の固定よりも短期の定期預金を組み合わせる方が合理的であり、格付けにこだわらず信用金庫等も含めて利率の良い先を探すべきだと主張した。議長（Speaker 4）は、預金金利が上昇するインセンティブは銀行側に乏しいこと、元本保全の観点から一定の格付け・1,000万円以内という基準を設けたことを説明し、状況が変われば見直す前提であるとした。採決の結果、賛成多数で承認された。\n\n【Speaker 4／議長・皿谷理事長】 現状、決済性預金として預金残高3,800万円を保有していますが、元本が全額保証される一方で利息がつきません。残高証明書の発行にも手数料がかかるため、これまで分散する意味がないとして決済性預金のままになっていました。昨今、金利が上昇していることもあり、ペイオフの範囲内で定期預金への移行を検討し、三井住友銀行に預けている決済性預金2,000万円のうち、1,000万円ずつを三菱UFJ銀行と北海道銀行に、それぞれ5年定期で預けることを考えています。\n\n選定の基準としては、国内の格付け機関によるシングルA以上の格付けを取得している銀行とし、1行あたり1,000万円を超えて預けないこととしています。期間については、金利が今後どうなるかは分かりませんが、確実に数字が読めるという点で5年定期を設定しています。現状、5月時点での利率は0.7％となっています。\n\n【Speaker 1／鈴木】 金利の動向は今後どうなるか分からないというのは事実ですが、インフレ傾向にあり、住宅ローンの固定金利なども上がってきています。定期預金の金利も今後上がっていくはずです。5年で0.7％を固定するのではなく、1年後、2年後の状況を見ながら、短期の定期を中心に組み替えていく方が合理的ではないでしょうか。格付けについても、信用金庫であっても1,000万円以内であれば保証されるはずですから、利率の良いところを探して預け替えていく方が賢明だと思います。この案は理事会で議論されたのでしょうか。\n\n【Speaker 4／議長・皿谷理事長】 前回の総会で決めた範囲での選定です。確かに住宅ローンの金利は上がっていますが、それにつれて銀行が預金金利を上げる環境になるかと言えば、実はそうではありません。銀行にとっては預金金利と貸出金利の差が広がる方が望ましく、預金金利を引き上げるインセンティブは乏しいのが実態です。鈴木さんのおっしゃる意見も理解できますが、1年後に同じ金利があるかどうかは誰にも保証できません。今見えているものを確実に運用するという判断で、5年の金利で設定する方がよいと判断し、理事会にも説明して賛同を得ています。\n\n【Speaker 1／鈴木】 格付けについては、1,000万円以内であれば保証されるという前提を踏まえ、その他の信用金庫等で利率の良いところも検討すべきです。また、1年経過した時点で金利の上昇傾向を再確認し、戦略を見直すということを、申し送り事項としていただきたいと思います。\n\n【Speaker 4／議長・皿谷理事長】 おっしゃるとおりで、状況が大きく変わった場合にはそのときに考えればよいと思います。預金は元本保証であることが前提ですが、信用金庫・信用組合の中には経営が不安定な例も見られるため、一概に信用金庫がよいとは言えません。格付けは一つの価値判断であり、仮に格付けの低いところに預けて破綻した場合、誰も責任を取れません。状況に応じて理事会で随時検討していきます。\n\n鈴木（Speaker 1）は、こうした議論の内容が議事録に記載されていない点について、情報公開・説明責任の観点から改善を求めた。採決の結果、第5号議案は賛成多数で承認された。\n\n────────────────────\n\n第6号議案　マンションすまい・る債購入の件\n\n【要点】 第6号議案は、住宅金融支援機構が発行するマンション管理組合専用の債券「マンションすまい・る債」を1,000万円購入するものである。第5号議案と同様、余剰資金の分散運用の一環として提案された。\n\n鈴木（Speaker 1）は、議案書の記載だけでは、大規模修繕までの間に中途解約する前提であることや、保有期間が長いほど利回りが上がる仕組みであることが理解できず、説明が不十分であると指摘した。議長（Speaker 4）及び加藤（Speaker 5）からの補足により、6年目に中途解約した場合の実質利回りが0.96％程度であることが説明された。採決の結果、賛成多数で承認された。\n\n【Speaker 4／議長・皿谷理事長】 すまい・る債は、議案書33ページに記載のとおり、日本国債と同等の信用力を持つ商品です。格付けは国内格付けでAAプラスとなっており、先ほどの定期預金より高い格付けです。一口50万円、20口で1,000万円を購入し、利率は平均で年2％という提案です。\n\n【Speaker 5／管理会社・加藤】 この商品は、住宅金融支援機構が発行するマンション管理組合専用の債券です。住宅金融支援機構は国が全額出資している独立行政法人で、住宅ローンのフラット35などを取り扱う公的機関です。株式投資のような価格変動型の商品ではなく、満期になれば元本が返還される仕組みです。多くのマンションで利用されている実績があります。\n\n今年度の募集における平均利率は年2％とされていますが、実際の利率は、預ける年数が経過するほど高くなる特殊な商品です。初年度は0.4％で銀行の定期預金と同程度ですが、年を経るごとに利率が上がり、満期である10年が経過すると単年利率が4％台になり、平均すると2％となります。当組合では大規模修繕の計画もあり、5〜6年ほどで中途解約することを想定していますが、その場合でも平均利率は0.7〜0.96％程度となり、第5号議案の定期預金とおおむね同水準になります。分散リスクの観点から、第5号議案と同様に提案させていただいています。\n\n【Speaker 1／鈴木】 今の説明で、この議案書を読んだだけでは理解できなかった点が確認できました。10年ものの債券ですが、実際には10年間預け続けることは前提としておらず、大規模修繕が6年後に予定されているため、その前に解約するという設定だという理解でよいでしょうか。\n\n【Speaker 5／管理会社・加藤】 そのようなイメージで提案させていただいています。ただ、資金の不足額がどの程度になるかは現時点では分からないため、その時点で理事会に判断していただきたいと考えています。利息は3年ごとにかかり、1年目0.4％、2年目0.6％、3年目0.8％というように毎年もらえる仕組みです。10年を満期としていますが、1年以上経過すれば満期前でも中途換金が可能で、その場合も元本はそのまま戻ってきます。\n\n【Speaker 1／鈴木】 ペナルティはあるのでしょうか。\n\n【Speaker 5／管理会社・加藤】 利回りについてのペナルティはありません。1年未満で解約する場合は、経過月数に応じた利率の割合になります。\n\nその後、議長（Speaker 4）から補足があり、6年目に中途解約した場合の実質利回りは0.96％程度であること、満期まで保有した場合の単年利回りは6年目時点で2.26％であることが説明された。\n\n【Speaker 4／議長・皿谷理事長】 1年目から黒字で記載されているとおり、0.4％、0.6％、0.8％というように、毎年利息が払われます。6年目を満期まで保有していれば2.26％となりますが、6年目に中途解約した場合は0.96％という商品になっています。5年で考えると、先ほどの定期預金とあまり変わりませんが、6年目に解約した場合でも0.96％です。6年定期という商品自体は存在しないため、大規模修繕の計画時期（6〜7年後）に合わせて、この商品を選択した方が利率の面でも有利だという判断です。万一、大規模修繕が予定より延びる場合でも、その分利息が増える形になります。\n\n【Speaker 1／鈴木】 今の説明で、この商品の優位性は理解できました。大規模修繕が6年後ではなく、8年後、10年後になる場合には、この商品を維持することで利率が上がっていくため有利になるという選択だったということですね。なぜそうした仕組みを最初から議案書に分かりやすく書いてくれないのでしょうか。今の説明があれば、優位性がよく理解できるのですが、議案書の記載だけでは説明が不十分だと思います。状況によって見直すという前提も、申し送りとして残していただきたいと思います。\n\n採決の結果、第6号議案は賛成多数（反対3名）で承認された。\n\n────────────────────\n\n第7号議案　宅配ボックス制御系部品更新工事実施の件\n\n【要点】 第7号議案は、宅配ボックスの制御系部品について、製造終了が見込まれることを理由に、予防保全として更新工事を行うものである。金額は税込114万9,500円。\n\n鈴木（Speaker 1）は、一社見積もりであることの妥当性に疑問を呈し、参考見積もりを含めた比較検討を求めた。後藤（Speaker 6）からも、故障してから対応する選択肢との比較について質問が出された。議長（Speaker 4）及び加藤（Speaker 5）は、部品の生産終了状況や予防保全の必要性について説明した。採決の結果、賛成多数で承認された。\n\n【Speaker 5／管理会社・加藤】 マンションに設置されている宅配ボックスについて、制御系の主要部品を更新し、今後も安定して稼働できる状態を維持するための工事を提案します。これは故障してから交換するものではなく、予防保全としての工事です。\n\n現在の宅配ボックスは設置から相当の年数が経過しており、制御基板の主要部品について、メーカーでの修理対応が既に終了しているとの指摘を受けています。故障が発生した場合、修理対応が困難になる可能性が高いとされています。現時点では故障していませんが、制御基板が壊れてしまうと、荷物が取り出せない、ボックスが開かない、設備全体が停止するといった事態が想定されます。今回は前面の全面更新ではなく、制御ユニットと制御系部品のみを更新し、既存設備を生かしながら延命を図る提案です。\n\n金額は税込114万9,500円です。全面更新よりも安く済み、何もしないより安全性が高いという中間的な選択です。相見積もりを取っていない理由は、今回の工事が既存の制御系部品に合わせた更新であり、他社メーカーの部品では対応できないためです。\n\n【Speaker 1／鈴木】 相見積もりが取れないという事情は一定程度理解しますが、他社の制御系に取り替えることを求めているわけではなく、参考見積もりを取りながら、この金額が妥当かどうかを査定する必要があると思います。参考見積もりが取れないということはないはずです。一社見積もりではなく、もう二社程度の見積もりを取っていただきたかったというのが私の意見です。また、故障の実態がどの程度進んでいるのか分からない以上、安全側の予防保全だからといって、いくらでも前倒しで交換すべきだという話にはならないはずで、その点も含めた説明をいただきたいと思います。\n\n後藤（Speaker 6）からは、部品供給が既に終了しているのであれば、いずれ同じ問題が起きるのではないか、壊れてから対応するという選択肢との比較についての質問があった。これに対し議長（Speaker 4）及び加藤（Speaker 5）から、現在は適合するユニットが入手可能であるが、将来的にはそれも入手できなくなる可能性があること、壊れてから対応すると長期間ボックスが使用できなくなるリスクがあることなどが説明された。\n\n採決の結果、第7号議案は賛成多数で承認された。\n\n────────────────────\n\n第8号議案　自動ドア装置更新工事実施の件\n\n【要点】 第8号議案は、正面玄関に設置された自動ドア4枚のうち、外側・内側各1枚（合計2枚）について、経年劣化を理由に更新工事を行うものである。金額は税込89万1,000円。\n\n鈴木（Speaker 1）は、対応可能なメーカーが1社に限られている点の特殊性、見積書の宛先が管理会社になっている点について、業界慣行を踏まえた懸念を示した。採決の結果、賛成多数で承認された。\n\n【Speaker 5／管理会社・加藤】 正面玄関に設置されている自動ドアのうち2枚を交換させていただきたいという提案です。これは見た目を整えるための工事ではなく、安全性と機能性を維持するための予防保全工事です。現在の自動ドアは2005年の建て直し工事から使用しており、築約21年が経過しています。メーカーはフルテック社です。駆動装置、コントローラー、センサー、電気錠などの主要部品が、メーカーの推奨交換時期（おおむね7年前後）を大幅に超過した状態で使用されています。現時点で大きな故障は発生していませんが、故障してから対応するとリスクが大きい設備であるため、更新を提案しています。\n\n故障した場合には、扉が開閉できなくなる動作不良や、劣化が進んだ場合に手動でも回転できなくなるギアロックという現象が発生するおそれがあります。今回は修理ではなく装置自体の更新とし、駆動装置・センサー・制御系等の部品を更新します。相見積もりを取っていない理由は、現在の自動ドア本体がフルテック社の専用仕様に合わせて設置されている設備であり、他社（ナブコ等）に確認したところ対応不可との回答を得ているためです。金額は税込89万1,000円で、4枚のうち、将来的に故障リスクが発生しやすいと考えられる玄関外側・内側の各1枚について、先行して更新するものです。\n\n【Speaker 1／鈴木】 フルテック社しか更新ができないという説明ですが、他のメーカー、ナブコ以外には確認していないのでしょうか。一般論として、自動ドアの仕組み上、特殊性があるようには見えません。私も自動ドアの仕様を設計図面に明記した経験がありますが、一般的には、駆動装置と電子装置が組み込まれているだけのものです。その特殊性について、もう少し詳しく説明していただけないでしょうか。\n\nこれに対し、機械が天井に埋め込まれている構造のためナブコでは対応できないとの説明があった。鈴木は、見積書の宛先が管理会社になっている点について、マージンの発生を疑われる可能性があるとして、宛先や見積もりの取り方について慎重な対応を求めた。\n\n【Speaker 1／鈴木】 この見積書の宛先が住友不動産さんになっているという点は、業界の慣行から見て、いろいろな疑義が生じるところです。マージンの問題など、当然疑われるようなことになりますので、不要にこのような宛先にしない方がよいと思います。フルテック社の専用部分でなければ対応できないという話であっても、一般的なレールやエンジン、電子部品の交換であれば、相応の相場があるはずです。その点も踏まえて、価格について慎重に検討していただきたいと思います。\n\n採決の結果、第8号議案は賛成多数で承認された。\n\n────────────────────\n\n第9号議案　マンション顧問弁護士委託契約更新の件\n\n【要点】 第9号議案では、顧問弁護士契約の更新と、顧問料の増額が審議された。現在の顧問料は月額税込2万2,000円であり、来年3月から月額税込5万5,000円への改定が提案された。\n\n議長（Speaker 4）は、鈴木からの多数の投書、法律的主張、民事調停、訴訟対応により、理事長や理事会の負担が非常に大きくなっていると説明した。また、投書を弁護士に送り、弁護士とやり取りし、回答案を確認していること、対応に年間約150時間を要したこと、次期理事会の負担軽減のためにも顧問弁護士が必要であると述べた。\n\n鈴木（Speaker 1）は、顧問弁護士の本来の役割は理事会への助言であり、組合員への代理回答は契約上当然に含まれるものではないと指摘した。投書の多くは法律問題ではなく、管理組合運営、規約運用、資料開示、議案説明に関するものであり、まず理事会と管理会社フロントが対応すべきだと述べた。また、顧問弁護士に丸投げすることで費用が増え、それを理由に顧問料を倍以上に増額するのは不適切だと主張した。\n\n議長（Speaker 4）は、鈴木が話し合いを求めながら民事調停を申し立てたことに不信感を持ったこと、投書対応に強い精神的負担を感じたこと、AIの回答は質問者に寄り添う傾向があり危険だと感じていることも述べた。鈴木は、民事調停は訴訟とは異なり、話し合いの延長上にある手続であると説明した。\n\n【Speaker 4／議長・皿谷理事長】 第9号議案について説明します。現在、当管理組合では、顧問弁護士と月額税込2万2,000円で契約しています。この契約は来年2月末まで続く予定です。しかし、近年、管理組合に対して、さまざまな質問や意見書、法律的な内容を含む問い合わせが届くようになっています。また、管理組合を相手とする訴訟も起こされています。そのため、理事会としても、法的リスクに適切に対応する必要があります。\n\n現在の顧問料では、投書や書類の内容を精査してもらったり、法的な観点から助言を受けたりするには、業務量が多すぎるという話が弁護士側からありました。そこで、来年3月からは、顧問料を月額税込5万5,000円に改定する方向で検討したいという提案がありました。これは予算に関わることですので、第9号議案として総会に上程しています。ご質問があればお願いします。\n\n【Speaker 1／鈴木】 203号室の鈴木です。そもそも、顧問弁護士による「代理回答」は、顧問弁護士契約の本来の業務内容ではないのではないでしょうか。顧問弁護士の役割は、理事会に対して法的な助言やアドバイスを行うことだと思います。\n\n私が理事会に出している投書や照会の内容を見ても、必ずしも弁護士が直接回答しなければならない法律問題ばかりではありません。多くは、管理組合の運営、規約に沿った対応、議案書の説明、資料の有無、理事会の検討状況などに関するものです。そのような内容であれば、まず理事会が確認し、管理会社のフロント担当者から助言を受けて、理事会として回答すればよいのではないでしょうか。管理会社にも専門知識がありますし、必要であれば管理会社内部の法務部門や弁護士に確認して、その内容を理事会に助言すればよいと思います。\n\nそれなのに、理事会が自分たちで十分に検討せず、顧問弁護士に投書を送り、弁護士が回答案を作り、それを理事長が確認して私に送るという形になっているように見えます。その結果、私の投書について、理事会で実質的に議論したり、内容を精査したりしていないのではないかと感じています。弁護士からの回答も、最近は「回答しません」「すでに回答済みです」といった短いものが多く、私が求めている本質的な回答になっていません。\n\nこのような代理回答のために、顧問弁護士の業務量が増えたとして、その費用を月額2万2,000円から5万5,000円へ増額するのは、納得できません。顧問弁護士を使うこと自体をすべて否定しているわけではありません。しかし、理事会がまず自分たちで検討すべき事項まで弁護士に委ね、その結果として費用が増えるというのはおかしいと思います。この議案は、業務内容や増額の理由が十分に整理されていないまま、金額だけを上げる内容になっているのではないでしょうか。組合員の大切な管理費を使う以上、このような形での増額には反対です。\n\n【Speaker 4／議長・皿谷理事長】 鈴木さんからの投書は、理事会の皆さん、監事の皆さん宛てに、かなり分厚い書面として、頻繁に届いています。私も当然、その内容を読んでいます。他の理事の方々も見ていると思います。そのうえで、私はそれを弁護士に送っています。そして、弁護士とメールなどでやり取りをしながら、「この件はこう考えた方がよいのではないか」「このように回答した方がよいのではないか」という助言を受けています。管理組合として対応している以上、私個人の判断だけで回答するわけにはいきません。管理組合として契約している顧問弁護士に相談しながら対応する必要があります。\n\n私が非常に不本意に思っているのは、以前、鈴木さんから「話し合いをしましょう」という申し入れがあったことです。後藤さんが理事長だった時期だったと思います。話し合いをしましょうという話があったにもかかわらず、その後、民事調停の申立てがありました。話し合いをしましょうと言いながら、同時に調停の申立てを準備していたということになると、こちらとしては、何をされるのか分からないという不信感を持ちます。そういう方と、単純に直接話し合いをしましょうというのは難しいと感じました。\n\nその後も、頻繁に投書が届いています。理事会の運営を揺さぶるような内容に感じるものもありますし、個人的には非常に腹立たしいと感じることもあります。朝、ポストを見て、また書面が入っているのを見ると、正直、強い負担を感じます。それでも、理事長を引き受けた以上、投書を持ち帰り、内容を確認し、弁護士にも送って相談しています。その中で、私の考えを伝え、弁護士から「それは言い過ぎではないか」「こう整理した方がよいのではないか」と助言を受けることもあります。\n\n私にとっては、これは明らかに大きな負担です。鈴木さんはご自身の主張を正しいと思っているのかもしれませんが、正義というものは人によって考え方が違います。自分の考えだけが正しいという形で投書を続けられると、受ける側としては非常に不愉快です。この1年間、私はその対応を我慢して行ってきました。仕事も忙しく、限られた時間の中で対応しています。鈴木さんへの対応や弁護士とのやり取りに、私自身のカウントでは年間約150時間、正確には10か月ほどで150時間程度かかっています。これは無償で行っているボランティアの役員業務です。時には夜眠れないこともありました。不眠になるほど精神的負担を感じたこともあります。損害賠償請求を検討できるのではないかと相談したこともあります。それでも、理事長として我慢して対応してきました。\n\nその意味で、私は顧問弁護士が必要だと思っています。管理会社である住友不動産建物サービスにも対応できる範囲には限界があります。最終的には、管理組合が当事者ですから、法的な助言を受ける必要があります。今回の顧問料増額についても、弁護士の先生と話をしました。その結果、この内容で予算に計上しましょうということになりました。\n\nただし、今後については、必ずしも現在の弁護士に限る必要はありません。他の弁護士でもよいと思います。次期理事会で、別の弁護士を探すことも可能です。実際、探せばもう少し安く対応してくれる弁護士がいるかもしれません。今回、現在の弁護士に依頼したのは、前回時間がなかったため、管理会社から紹介を受けたという経緯です。これについても、何か癒着があるのではないかと疑われることがありますが、私はそのようなつもりはありません。いずれにしても、このような状況では、理事を引き受ける人がいなくなってしまいます。役員にもそれぞれ生活があります。管理費や修繕積立金にも限りがあります。訴訟が一つ起きれば、弁護士費用として大きな金額がかかります。それが何度も続けば、管理組合の財政にも影響します。そのような時代だからこそ、法律的な議論や投書に対して、理事会が適切に対応できるように、顧問弁護士が必要だと考えています。\n\nまた、最近ではAIを使っていろいろな主張を作ることもできるようになっています。私もAIを使うことがありますが、AIは質問する人に寄り添った回答をする傾向があります。非常に危険な面もあります。それをあたかも絶対に正しいものとして出されると、こちらとしては疑問を感じます。鈴木さんは、マンション管理士の資格を持っているようですから、詳しい方なのだと思います。だからこそ、管理組合としても、理事会がきちんと運営できるように、専門家の支援が必要だと考えています。私は、次期以降の理事会の負担を軽くするためにも、顧問弁護士が必要だと判断し、この議案を提案しています。\n\n【Speaker 1／鈴木】 今の話では、私が話し合いを求めたにもかかわらず、民事調停を申し立てたことが問題だという説明になっています。しかし、民事調停は、訴訟とは違います。裁判所で勝ち負けを決めるというより、裁判所の関与のもとで、当事者が話し合いをする手続です。私は、民事調停は話し合いの延長上にある手続だと理解しています。その後も、私は話し合いを提案しています。裁判をやめて話し合いに移行しましょうという趣旨の申し入れもしてきました。しかし、理事会側では、私が民事調停を申し立てたことで感情を害されたのか、話し合いの機会が受け入れられなくなっているように感じています。管理組合の内部で、組合員と理事会が話し合う機会を持てないというのは、非常に問題だと思います。\n\n私が言いたいのは、投書や照会が「迷惑行為」と言われるのであれば、そうならないように、きちんと話し合いをしてほしいということです。また、この第9号議案については、業務内容を変えないまま顧問料だけを上げるのはおかしいと思います。顧問弁護士の業務が「助言」なのか、「組合員への代理回答」まで含むのかを明確にする必要があります。代理回答を含めるのであれば、そのことを契約内容として明確にしたうえで議案にすべきです。単に顧問料だけを増額するという形では、不十分だと思います。\n\n採決の結果、第9号議案は賛成多数で承認された。\n\n────────────────────\n\n第10号議案　第22期事業計画案及び管理費等収支予算案の件\n\n【要点】 第10号議案では、第22期事業計画案と管理費等収支予算案が審議された。管理会社からは、自動ドア装置更新、宅配ボックス制御ユニット更新、消防関係設備更新、消火器及び連結送水装置更新などが事業計画に盛り込まれていることが説明された。管理会計では、管理費収入等を含めた収入約1,907万円、支出約1,981万円、当期発生剰余金マイナス約77万円が見込まれた。灯油会計は収支同額、修繕積立金会計では収入約2,829万円、支出約204万円、次期繰越剰余金約8,564万円が見込まれた。\n\n鈴木（Speaker 1）は、第22期事業計画に、管理規約改正の継続審議や長期修繕計画上の積み残し業務について、どのような体制で取り組むのかが明記されていないと指摘した。また、南側歩道沿いの生垣の冬季寒冷紗養生、ロードヒーティングボイラー更新後の保守点検、連結送水管送水マップの不鮮明な表示など、以前から指摘している課題が未解決であると述べた。\n\nさらに、管理費会計に剰余金がある中で、管理委託費値上げをそのまま受け入れるのではなく、当面は剰余金で補填し、その間に他社相見積もりを取るなど、管理委託費の適正性を検証すべきだと主張した。議長（Speaker 4）は、相見積もりについては、3年から5年に1回程度、次期理事会で検討するよう申し送りたいと述べた。\n\n【Speaker 4／議長・皿谷理事長】 ありがとうございます。それでは、第10号議案に入ります。第10号議案は、第22期事業計画案及び管理費等収支予算案の件です。議案書の46ページからになります。管理会社から説明をお願いします。\n\n【Speaker 5／管理会社・加藤】 ありがとうございます。議案書46ページをご覧ください。第22期の事業計画を記載しています。すでに実施済みのものや、実施日が決まっているものについては、その内容を記載しています。まだ実施前のものについては、今後予定されているものとしてご理解ください。\n\n第22期の共用部分の改修・修繕としては、先ほど承認いただいた自動ドア装置の更新、宅配ボックス制御ユニットの更新、消防関係設備の更新工事を予定しています。なお、消火器及び連結送水装置については、消防法に基づき、設置と維持が義務付けられている重要な防災設備です。使用期限や耐用年数の到来に応じて、適切な状態を維持するため、継続的に更新・交換していく必要があります。今回の対象設備は、いずれも2025年10月をもって耐用年数を経過するため、消防法令に基づき、まとめて更新を実施する予定です。これらについては、すでに理事会で複数社から見積もりを取得し、内容及び金額を比較検討したうえで、妥当であると判断して実施するものです。\n\n続いて、47ページ以降の予算案について説明します。48ページから管理会計の予算になります。時間の関係もありますので、少し足早に説明します。まず、管理会計です。収入の部は、皆様からいただく管理費収入、駐車場使用料収入などを含めて、1,907万87円を見込んでいます。支出の部は、管理事務委託料などを含め、51ページ中段の支出合計として、1,981万1,604円を見込んでいます。その結果、当期発生剰余金は、マイナス77万3,817円となる見込みです。ただし、前期繰越剰余金がありますので、それを含めて、次期繰越剰余金は385万9,620円となる見込みです。\n\n次に、50ページの灯油会計です。収入は740万円、支出も740万円を見込んでおり、差引は0円です。前期繰越剰余金をそのまま引き継ぐ形になります。\n\n次に、51ページの修繕積立金会計です。収入の部は、皆様からいただく修繕積立金、駐車場使用料、資産運用益などを含めて、2,829万6,017円を見込んでいます。支出の部については、先ほどご承認いただいた自動ドア更新、宅配ボックス制御系更新などに、204万500円を見込んでいます。その結果、当期発生剰余金は、プラス2,625万5,525円となる見込みです。次期繰越剰余金については、8,564万3,450円を見込んでいます。私からの説明は以上です。\n\n【Speaker 1／鈴木】 203号室の鈴木です。まず確認ですが、今の説明は、第10号議案の事業計画案というくくりでよろしいですね。\n\n第22期の事業計画についてですが、管理規約の継続審議も必要ですし、長期修繕計画に計上されていながら、検討が遅れて積み残しになっている業務もいくつかあります。ところが、それらを第22期にどのような体制で進めるのかが、事業計画に明記されていません。このままでは、新年度の立ち上がりが遅くなるのではないかと心配しています。\n\nまた、以前から私が何度も検討をお願いしている件があります。一つ目は、南側歩道沿いの生垣の冬季寒冷紗養生の件です。毎年、青い寒冷紗で養生されていますが、業者からは、その養生は必要ないという話が出ていると聞いています。それにもかかわらず、私が理事会に検討を求めても、何も検討されていないように見えます。この件については、早急に検討してください。\n\n二つ目は、ロードヒーティングボイラー更新後の保守・点検の件です。当初は、更新工事を行った恒栄工業が10年間、保守・点検を行うという話だったのかと思います。しかし、その後、その話がいつの間にか消えてしまったように見えます。理事会議事録を見ると、当時、恒栄工業でボイラー更新工事を担当していた渋谷さんという方が光栄工業を退職し、独立した後、その方に委託するかどうかという話になっていたようにも見えます。しかし、その経緯が全く分かりません。10年間の点検業務は、結局どうなったのでしょうか。200万円もかかるという話もあり、それはあり得ないのではないかという話もありましたが、その後の整理が不透明です。当時の担当者に引き継がれたのか、誰がどのように判断したのか、管理組合に十分報告されていません。透明性も説明責任も果たされていないと思います。\n\n三つ目は、連結送水管の送水マップの件です。南側の生垣の立ち上がりの壁面に、連結送水管の送水マップが表示されています。しかし、数年前から文字や経路が不鮮明で、ほとんど役に立たない状態になっています。昨年の総会でもこの点を指摘し、「分かりました」という話がありましたが、いまだに直っていません。小さいことのように見えるかもしれませんが、防災設備に関わる表示であり、放置すべきではないと思います。\n\nさらに、管理費会計の剰余金についても申し上げます。先ほどの議論でも、管理費会計には約400万円の剰余金があるという話がありました。今後、管理費が不足するようであれば、当面はその剰余金で補填し、その間に値上げの必要性について組合員の合意を得ることも考えられるはずです。また、その間に、他社から相見積もりを取るべきです。3年に1回、あるいは5年に1回程度、現在の管理委託費が適正価格なのかを他社と比較するプロセスが欠けています。管理会社が「当社の金額は適正です」「他のマンションと単価は同程度です」と説明しても、それは身内の情報です。客観的な証拠や根拠にはなりにくいと思います。それをそのまま受け入れて、管理委託費の値上げに従っていく理事会の運営は、適切とは思えません。したがって、次期以降は必ず他社への相見積もりを検討することを、申し送り事項として残し、進めていただきたいと思います。\n\n今回の値上げについては、今この場で数の論理により覆すことはできないと思います。不本意ながら、結果として認めざるを得ない面もあるかもしれません。しかし、この値上げに至るプロセスについては、厳重に抗議します。これを私の意見とします。\n\n【Speaker 4／議長・皿谷理事長】 ご意見ありがとうございます。相見積もりについては、次期理事会にぜひ検討していただきたい事項として、申し送りしたいと思います。やはり3年から5年に1回程度は、現在の管理会社の価格が適正かどうかを他社と比較して確認することは、管理組合の財産を守るうえでも必要なことだと思います。その点は、しっかり次期理事会に引き継ぎます。\n\n採決の結果、第10号議案（第22期事業計画案及び管理費等収支予算案）は承認された。\n\n────────────────────\n\n総括的整理\n\n今回の重要事項説明会及び第1号議案から第10号議案までの審議を通じて、共通して浮かび上がった主な論点は、次のとおりである。\n\n1　手続きの区分（重要事項説明と総会議案審議） 重要事項の説明や契約変更点の質疑応答は、本来は総会議案審議の場ではなく、その前段階で管理会社が責任をもって行うべきものであり、両者を混同した進行は手続き上の問題があるとの指摘があった。\n\n2　理事会主体の説明と管理会社主体の説明の区別 総会議案は管理組合の議案であり、管理会社が実務支援を行うとしても、最終的には理事会が主体的に説明し、責任を持つべきであるとの問題が提起された。\n\n3　議案書・事業報告・決算報告の分かりやすさ 定型的な点検や収支数値だけでなく、その期に発生した重要事項、裁判対応、顧問弁護士回答、理事会の判断経過、積み残し課題などを記録し、次期理事会や組合員に分かる形で残す必要があるとの指摘があった。\n\n4　費用支出の内訳と透明性 管理委託費、弁護士費用、再委託費、管理組合直接委託費などについて、支出項目が分かりにくいとの指摘があり、組合員が費用の内容を確認できるよう、分類と表示方法の改善が求められた。\n\n5　顧問弁護士利用の範囲 顧問弁護士は理事会への助言者なのか、組合員への代理回答者なのか、その業務範囲が不明確であるとの問題が提起された。代理回答業務を顧問契約に含めるのであれば、契約内容や費用根拠を明確にすべきであるとの指摘があった。\n\n6　管理委託費・顧問料・各種工事費の増額根拠 管理委託費や顧問弁護士料、設備更新工事費の増額について、値上げ理由そのものには一定の理解可能性がある一方で、見積書、内訳、時間数、業務範囲、他社比較、代替案などが十分に示されていないとの問題があった。\n\n7　相見積もり・価格検証の必要性 管理委託費及び各種更新工事については、定期的に他社見積もりを取得し、現在の価格が適正か検証することが必要であるとの意見が出され、次期理事会への申し送り事項とされた。\n\n8　積み残し課題の事業計画化 管理規約改正の継続審議、長期修繕計画上の未処理事項、生垣養生、ロードヒーティング保守、連結送水管送水マップなど、これまで指摘されてきた課題について、第22期事業計画に具体的な体制やスケジュールが記載されていないとの指摘があった。\n\n以上\n\nファイルとしても保存してありますので、別の端末や別のブラウザでダウンロードを再度お試しいただくか、必要であれば内容を分割して再送することもできます。",layer2:"",layer3:""}];


function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){
    s.style.display="none";
    s.classList.remove("active");
  });
  var el=document.getElementById(id);
  el.style.display="flex";
  el.classList.add("active");
  window.scrollTo(0,0);
}

function goPin(mode){
  MODE=mode;
  document.getElementById("pin-icon").textContent=mode==="admin"?"🔑":"🔒";
  document.getElementById("pin-hint").textContent=mode==="admin"?"9999":"2039";
  ["p0","p1","p2","p3"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("pin-error").style.display="none";
  showScreen("pin");
  setTimeout(function(){document.getElementById("p0").focus();},100);
}

function pi(idx,val){
  val=val.replace(/[^0-9]/g,"").slice(-1);
  document.getElementById("p"+idx).value=val;
  if(val&&idx<3)document.getElementById("p"+(idx+1)).focus();
  var pins=["p0","p1","p2","p3"].map(function(id){return document.getElementById(id).value;});
  if(pins.every(function(p){return p!==""})){
    var entered=pins.join("");
    var ok=(MODE==="member"&&entered==="2039")||(MODE==="admin"&&entered==="9999");
    if(ok){
      document.getElementById("pin-error").style.display="none";
      if(MODE==="member"){
        var today=new Date().toLocaleDateString("ja-JP");
        STATS.total=(STATS.total||0)+1;
        if(STATS.lastDate!==today){STATS.today=0;STATS.lastDate=today;}
        STATS.today=(STATS.today||0)+1;
        try{localStorage.setItem("ks",JSON.stringify(STATS));}catch(e){}
        buildBoard();
        showScreen("board");
      }else{
        showScreen("board");
      }
    }else{
      document.getElementById("pin-error").style.display="block";
      setTimeout(function(){
        ["p0","p1","p2","p3"].forEach(function(id){document.getElementById(id).value="";});
        document.getElementById("pin-error").style.display="none";
        document.getElementById("p0").focus();
      },700);
    }
  }
}

function pk(idx,e){
  if(e.key==="Backspace"&&!document.getElementById("p"+idx).value&&idx>0)
    document.getElementById("p"+(idx-1)).focus();
}

function buildBoard(){
  var list=document.getElementById("notice-list");
  list.innerHTML="";
  // バロメーター
  if(STATS.total>0){
    var bar=document.createElement("div");
    bar.style.cssText="background:white;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.07);";
    bar.innerHTML="<div style='font-size:14px;font-weight:bold;color:#1a3a6b;margin-bottom:10px;'>📊 組合員の関心バロメーター</div>"
      +"<div style='display:flex;gap:10px;'>"
      +"<div style='flex:1;background:#eef3fb;border-radius:8px;padding:10px;text-align:center;border:1px solid #1a3a6b;'>"
      +"<div style='font-size:11px;color:#1a3a6b;font-weight:bold;'>累計アクセス</div>"
      +"<div style='font-size:32px;font-weight:bold;color:#1a3a6b;'>"+STATS.total+"</div>"
      +"<div style='font-size:10px;color:#888;'>回</div></div>"
      +"<div style='flex:1;background:#fff7e6;border-radius:8px;padding:10px;text-align:center;border:1px solid #d97706;'>"
      +"<div style='font-size:11px;color:#92400e;font-weight:bold;'>本日</div>"
      +"<div style='font-size:32px;font-weight:bold;color:#d97706;'>"+STATS.today+"</div>"
      +"<div style='font-size:10px;color:#888;'>回</div></div></div>";
    list.appendChild(bar);
  }
  // お知らせカード
  var sorted=NOTICES.slice().sort(function(a,b){return(b.pinned?1:0)-(a.pinned?1:0)||b.id-a.id;});
  sorted.forEach(function(n){
    var card=document.createElement("div");
    card.className="notice-card";
    card.style.borderLeft="5px solid "+n.color;
    var body=document.createElement("div");
    body.style.padding="13px 15px";
    // ヘッダー行
    var hdr=document.createElement("div");
    hdr.style.cssText="display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap;";
    var cat=document.createElement("span");
    cat.style.cssText="background:"+n.color+";color:white;font-size:11px;font-weight:bold;padding:2px 9px;border-radius:4px;";
    cat.textContent=n.category;
    hdr.appendChild(cat);
    if(n.pinned){var pin=document.createElement("span");pin.style.cssText="background:#fff7e6;border:1px solid #d97706;color:#92400e;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:bold;";pin.textContent="📌 重要";hdr.appendChild(pin);}
    var dt=document.createElement("span");dt.style.cssText="font-size:11px;color:#666;";dt.textContent=n.date;hdr.appendChild(dt);
    body.appendChild(hdr);
    var title=document.createElement("h3");
    title.style.cssText="margin:0 0 4px;font-size:14px;color:#1a3a6b;line-height:1.5;font-weight:bold;";
    title.textContent=n.title;
    body.appendChild(title);
    var summ=document.createElement("p");
    summ.style.cssText="margin:0;font-size:12px;color:#555;line-height:1.6;";
    summ.textContent=n.summary;
    body.appendChild(summ);
    card.appendChild(body);
    var footer=document.createElement("div");
    footer.className="notice-footer";
    footer.textContent="詳細を読む →";
    card.appendChild(footer);
    card.addEventListener("click",function(){SELECTED=n;TAB="layer1";buildDetail();showScreen("detail");});
    list.appendChild(card);
  });
}

function buildDetail(){
  var n=SELECTED;
  var c=document.getElementById("detail-content");
  c.innerHTML="";
  var h1=document.createElement("h1");
  h1.style.cssText="font-size:17px;color:#1a3a6b;margin:0 0 10px;line-height:1.6;font-weight:bold;";
  h1.textContent=n.title;c.appendChild(h1);
  var dt=document.createElement("p");
  dt.style.cssText="font-size:13px;color:#555;margin:0 0 14px;";
  dt.textContent=n.date+" | "+n.tag;c.appendChild(dt);
  // タブ
  var tabs=[{k:"layer1",l:"📋 事実",color:"#1a3a6b",bg:"#eef3fb"},{k:"layer2",l:"🔍 分析",color:"#166534",bg:"#f0fdf4"},{k:"layer3",l:"💬 問いかけ",color:"#92400e",bg:"#fff7e6"}];
  var tabRow=document.createElement("div");
  tabRow.style.cssText="display:flex;border-radius:8px 8px 0 0;overflow:hidden;border:1px solid #dce4f0;border-bottom:none;";
  tabs.forEach(function(t,i){
    var btn=document.createElement("button");
    btn.style.cssText="flex:1;padding:8px 3px;border:none;cursor:pointer;font-size:11px;"+(i<2?"border-right:1px solid #dce4f0;":"")+"background:"+(TAB===t.k?t.bg:"#f4f7fb")+";color:"+(TAB===t.k?t.color:"#888")+";font-weight:"+(TAB===t.k?"bold":"normal")+";border-bottom:"+(TAB===t.k?"2px solid "+t.color:"2px solid transparent")+";";
    btn.textContent=t.l;
    (function(key){btn.addEventListener("click",function(){TAB=key;buildDetail();});})(t.k);
    tabRow.appendChild(btn);
  });
  c.appendChild(tabRow);
  var ct=tabs.find(function(t){return t.k===TAB;});
  var box=document.createElement("div");
  box.style.cssText="background:"+ct.bg+";border:1px solid #dce4f0;border-top:none;border-radius:0 0 8px 8px;padding:14px;margin-bottom:12px;";
  var pre=document.createElement("pre");
  var text=(n[TAB]||"").replace(/\n/g,"\n");
  pre.textContent=text;
  box.appendChild(pre);
  c.appendChild(box);
  var foot=document.createElement("div");
  foot.style.cssText="padding:10px 12px;background:#eef3fb;border-radius:8px;border-left:4px solid #1a3a6b;font-size:12px;color:#1a3a6b;font-weight:bold;";
  foot.textContent="📌 本ページは203号室　鈴木章三郎（個人）が公開情報に基づき作成したものです。管理組合の公式見解ではありません。";
  c.appendChild(foot);
}

// 初期表示
showScreen('top');
</script>
</body>
