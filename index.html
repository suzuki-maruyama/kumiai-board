<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>シティハウス円山北3条 組合員専用告知板 v10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f4f7fb;font-family:sans-serif;min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script>
var MODE="member", SELECTED=null, TAB="layer1";
var STATS={total:0,today:0,lastDate:""};
try{var _s=localStorage.getItem("ks2");if(_s)STATS=JSON.parse(_s);}catch(e){}

var NOTICES=[
  {id:1,category:"重要",color:"#b91c1c",pinned:true,date:"2026年6月27日",tag:"総会・理事会",
   title:"No1. 重要事項説明会・第21期定期総会　審議要旨",
   summary:"重要事項説明会および第21期定期総会（第1号〜第10号議案）の審議要旨。各議案の論点・発言・採決結果を簡潔にまとめたもの。",
   pdf:"shingi_youshi.pdf",layer1:"loading",layer2:"",layer3:""}
 ,{id:2,category:"重要",color:"#b91c1c",pinned:true,date:"2026年6月27日",tag:"総会・理事会",
   title:"No2. 重要事項説明会・第21期定期総会　発言記録（全文）",
   summary:"重要事項説明会および第21期定期総会における発言者別の発言記録の全文。",
   pdf:"hatsugen_kiroku.pdf",layer1:"loading",layer2:"",layer3:""}
 ,{id:3,category:"重要",color:"#b91c1c",pinned:true,date:"2026年7月8日",tag:"AI評価・助言",
   title:"No3. 第1回　Claudeによる評価及び助言",
   summary:"重要事項説明会及び定期総会に関するAI評価・助言資料　その１",
   pdf:"claude_hyouka.pdf",layer1:"",layer2:"",layer3:""}
 ,{id:4,category:"重要",color:"#b91c1c",pinned:true,date:"2026年7月8日",tag:"AI評価・助言",
   title:"No4. 第2回　Geminiによる評価及び助言",
   summary:"重要事項説明会及び定期総会に関するAI評価・助言資料　その２",
   pdf:"gemini_hyouka.pdf",layer1:"",layer2:"",layer3:""}
 ,{id:5,category:"重要",color:"#b91c1c",pinned:true,date:"2026年7月8日",tag:"AI評価・助言",
   title:"No5. 第3回　ChatGPTによる評価及び助言",
   summary:"重要事項説明会及び定期総会に関するAI評価・助言資料　その3",
   pdf:"chatgpt_hyouka.pdf",layer1:"",layer2:"",layer3:""}
 ,{id:6,category:"重要",color:"#b91c1c",pinned:true,date:"2026年7月8日",tag:"AI評価・助言",
   title:"No6. 三つのAI評価から見えた共通課題　投書書面",
   summary:"重要事項説明会及び定期総会に関するAI評価・助言資料　総括",
   pdf:"sougou_kadai.pdf",layer1:"",layer2:"",layer3:""}
];

// data.jsから本文を読み込む
function loadData(){
  if(typeof NOTICE_DATA!=="undefined"){
    NOTICES[0].layer1=NOTICE_DATA.youshi;
    NOTICES[1].layer1=NOTICE_DATA.hatsugen;
  }else{
    window._dataReady=function(){
      NOTICES[0].layer1=NOTICE_DATA.youshi;
      NOTICES[1].layer1=NOTICE_DATA.hatsugen;
    };
  }
}
loadData();

function render(screenId){
  var app=document.getElementById("app");
  app.innerHTML="";
  if(screenId==="top") app.appendChild(buildTop());
  else if(screenId==="pin") app.appendChild(buildPin());
  else if(screenId==="board") app.appendChild(buildBoard());
  else if(screenId==="detail") app.appendChild(buildDetail());
  else if(screenId==="pdfview") app.appendChild(buildPdfView());
  window.scrollTo(0,0);
}

function el(tag,attrs,html){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="style")e.style.cssText=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(html!==undefined)e.innerHTML=html;
  return e;
}

function buildTop(){
  var d=el("div",{style:"min-height:100vh;background:#f4f7fb;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;"});
  var inner=el("div",{style:"width:100%;max-width:400px;"});
  inner.appendChild(el("div",{style:"background:#1a3a6b;border-radius:14px;padding:28px 24px;text-align:center;margin-bottom:20px;box-shadow:0 4px 20px rgba(26,58,107,0.25);"},
    "<div style='font-size:10px;letter-spacing:4px;color:#a8c4e8;margin-bottom:10px;'>CITY HOUSE MARUYAMA KITA 3-JO</div>"+
    "<div style='font-size:24px;font-weight:bold;color:white;letter-spacing:2px;line-height:1.4;margin-bottom:6px;'>シティハウス円山北3条</div>"+
    "<div style='font-size:14px;color:#c8dcf4;'>管理組合　組合員専用告知板</div>"
  ));
  var btns=el("div",{style:"display:flex;flex-direction:column;gap:12px;margin-bottom:16px;"});
  var b1=el("button",{style:"background:#1a3a6b;color:white;font-size:17px;font-weight:bold;padding:18px;border:none;border-radius:12px;cursor:pointer;"},"🔒　組合員ページを閲覧する");
  b1.addEventListener("click",function(){MODE="member";render("pin");});
  var b2=el("button",{style:"background:white;border:2px solid #1a3a6b;color:#1a3a6b;font-size:14px;font-weight:bold;padding:14px;border-radius:12px;cursor:pointer;"},"🔑　管理者ログイン");
  b2.addEventListener("click",function(){MODE="admin";render("pin");});
  btns.appendChild(b1);btns.appendChild(b2);
  inner.appendChild(btns);
  inner.appendChild(el("div",{style:"padding:14px 16px;background:#fffbeb;border:2px solid #d97706;border-radius:10px;font-size:12px;color:#78350f;line-height:1.9;"},
    "<strong>📋 このページについて</strong><br>本ページは203号室　鈴木章三郎が個人の立場から公開情報に基づき作成したものです。管理組合の公式見解ではありません。"
  ));
  d.appendChild(inner);
  return d;
}

function buildPin(){
  var d=el("div",{style:"min-height:100vh;background:#f4f7fb;display:flex;align-items:center;justify-content:center;padding:20px;"});
  var back=el("button",{style:"position:fixed;top:20px;left:20px;background:white;border:2px solid #1a3a6b;color:#1a3a6b;border-radius:10px;padding:10px 18px;font-size:14px;cursor:pointer;"},"← 戻る");
  back.addEventListener("click",function(){render("top");});
  d.appendChild(back);
  var card=el("div",{style:"width:100%;max-width:360px;background:white;border-radius:18px;padding:36px 28px;box-shadow:0 4px 32px rgba(0,0,0,0.10);text-align:center;"});
  card.innerHTML=
    "<div style='font-size:44px;margin-bottom:16px;'>"+(MODE==="admin"?"🔑":"🔒")+"</div>"+
    "<div style='font-size:20px;font-weight:bold;color:#1a3a6b;margin-bottom:8px;'>暗証番号を入力</div>"+
    "<div style='font-size:13px;color:#555;margin-bottom:24px;'>4桁の暗証番号を入力してください</div>"+
    "<div style='display:flex;gap:12px;justify-content:center;margin-bottom:16px;'>"+
    "<input id='p0' type='tel' maxlength='1' style='width:56px;height:68px;text-align:center;font-size:28px;font-weight:bold;border-radius:10px;border:3px solid #d0d0d0;color:#1a3a6b;background:#f5f5f5;'>"+
    "<input id='p1' type='tel' maxlength='1' style='width:56px;height:68px;text-align:center;font-size:28px;font-weight:bold;border-radius:10px;border:3px solid #d0d0d0;color:#1a3a6b;background:#f5f5f5;'>"+
    "<input id='p2' type='tel' maxlength='1' style='width:56px;height:68px;text-align:center;font-size:28px;font-weight:bold;border-radius:10px;border:3px solid #d0d0d0;color:#1a3a6b;background:#f5f5f5;'>"+
    "<input id='p3' type='tel' maxlength='1' style='width:56px;height:68px;text-align:center;font-size:28px;font-weight:bold;border-radius:10px;border:3px solid #d0d0d0;color:#1a3a6b;background:#f5f5f5;'>"+
    "</div>"+
    "<div id='pin-err' style='display:none;padding:10px;background:#fef2f2;border:2px solid #b91c1c;border-radius:8px;color:#b91c1c;font-size:13px;margin-bottom:12px;'>暗証番号が違います</div>";
  d.appendChild(card);
  setTimeout(function(){
    ["p0","p1","p2","p3"].forEach(function(id,i){
      var inp=document.getElementById(id);
      if(!inp)return;
      inp.addEventListener("input",function(){
        var v=this.value.replace(/[^0-9]/g,"").slice(-1);
        this.value=v;
        if(v&&i<3)document.getElementById("p"+(i+1)).focus();
        var pins=["p0","p1","p2","p3"].map(function(x){return(document.getElementById(x)||{value:""}).value;});
        if(pins.every(function(p){return p!==""})){
          var entered=pins.join("");
          var ok=(MODE==="member"&&entered==="2039")||(MODE==="admin"&&entered==="9999");
          if(ok){
            if(MODE==="member"){
              var today=new Date().toLocaleDateString("ja-JP");
              STATS.total=(STATS.total||0)+1;
              if(STATS.lastDate!==today){STATS.today=0;STATS.lastDate=today;}
              STATS.today=(STATS.today||0)+1;
              try{localStorage.setItem("ks2",JSON.stringify(STATS));}catch(e){}
            }
            render("board");
          }else{
            var err=document.getElementById("pin-err");
            if(err)err.style.display="block";
            setTimeout(function(){
              ["p0","p1","p2","p3"].forEach(function(x){var e=document.getElementById(x);if(e)e.value="";});
              var err2=document.getElementById("pin-err");
              if(err2)err2.style.display="none";
              var p=document.getElementById("p0");if(p)p.focus();
            },700);
          }
        }
      });
      inp.addEventListener("keydown",function(e){
        if(e.key==="Backspace"&&!this.value&&i>0)document.getElementById("p"+(i-1)).focus();
      });
    });
    var p0=document.getElementById("p0");if(p0)p0.focus();
  },100);
  return d;
}

function buildBoard(){
  var d=el("div",{style:"min-height:100vh;background:#f4f7fb;display:flex;flex-direction:column;"});
  var hdr=el("div",{style:"background:#1a3a6b;padding:16px;"});
  hdr.innerHTML="<div style='display:flex;align-items:center;justify-content:space-between;'>"+
    "<div><div style='font-size:10px;color:#a8c4e8;letter-spacing:3px;margin-bottom:3px;'>MEMBERS ONLY</div>"+
    "<div style='font-size:18px;font-weight:bold;color:white;'>組合員専用告知板</div>"+
    "<div style='font-size:12px;color:#c8dcf4;'>シティハウス円山北3条　管理組合</div></div>"+
    "<button id='logout-btn' style='background:white;border:none;color:#1a3a6b;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer;'>ログアウト</button></div>";
  d.appendChild(hdr);
  setTimeout(function(){
    var lb=document.getElementById("logout-btn");
    if(lb)lb.addEventListener("click",function(){render("top");});
  },50);
  var list=el("div",{style:"padding:14px;"});
  if(STATS.total>0){
    list.innerHTML+="<div style='background:white;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.07);'>"+
      "<div style='font-size:14px;font-weight:bold;color:#1a3a6b;margin-bottom:10px;'>📊 組合員の関心バロメーター</div>"+
      "<div style='display:flex;gap:10px;'>"+
      "<div style='flex:1;background:#eef3fb;border-radius:8px;padding:10px;text-align:center;border:1px solid #1a3a6b;'><div style='font-size:11px;color:#1a3a6b;font-weight:bold;'>累計アクセス</div><div style='font-size:32px;font-weight:bold;color:#1a3a6b;'>"+STATS.total+"</div><div style='font-size:10px;color:#888;'>回</div></div>"+
      "<div style='flex:1;background:#fff7e6;border-radius:8px;padding:10px;text-align:center;border:1px solid #d97706;'><div style='font-size:11px;color:#92400e;font-weight:bold;'>本日</div><div style='font-size:32px;font-weight:bold;color:#d97706;'>"+STATS.today+"</div><div style='font-size:10px;color:#888;'>回</div></div>"+
      "</div></div>";
  }
  NOTICES.slice().sort(function(a,b){return(b.pinned?1:0)-(a.pinned?1:0)||b.id-a.id;}).forEach(function(n,idx){
    var card=el("div",{style:"background:white;border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.07);border-left:5px solid "+n.color+";"});
    var body=el("div",{style:"padding:13px 15px;"});
    var hdrRow=el("div",{style:"display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap;"});
    var cat=el("span",{style:"background:"+n.color+";color:white;font-size:11px;font-weight:bold;padding:2px 9px;border-radius:4px;"},n.category);
    hdrRow.appendChild(cat);
    if(n.pinned){var pin=el("span",{style:"background:#fff7e6;border:1px solid #d97706;color:#92400e;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:bold;"},"📌 重要");hdrRow.appendChild(pin);}
    var dt=el("span",{style:"font-size:11px;color:#666;"},n.date);hdrRow.appendChild(dt);
    body.appendChild(hdrRow);
    var title=el("h3",{style:"margin:0 0 4px;font-size:14px;color:#1a3a6b;line-height:1.5;font-weight:bold;"},n.title);
    body.appendChild(title);
    var summ=el("p",{style:"margin:0;font-size:12px;color:#555;line-height:1.6;"},n.summary);
    body.appendChild(summ);
    card.appendChild(body);
    var footer=el("div",{style:"background:#f4f7fb;padding:7px 15px;font-size:12px;color:#1a3a6b;font-weight:bold;text-align:right;"},"詳細を読む →");
    card.appendChild(footer);
    (function(notice){card.addEventListener("click",function(){
      var pdfUrl=notice.pdf||null;
      if(pdfUrl){
        SELECTED=notice;render("pdfview");
      }else{
        SELECTED=notice;TAB="layer1";render("detail");
      }
    });})(n);
    list.appendChild(card);
  });
  d.appendChild(list);
  d.appendChild(el("div",{style:"text-align:center;padding:16px;border-top:1px solid #dce4f0;font-size:11px;color:#888;line-height:1.9;"},
    "本ページは203号室　鈴木章三郎が個人の立場から作成したものです。<br>管理組合の公式見解ではありません。"
  ));
  return d;
}

function buildDetail(){
  var n=SELECTED;
  var d=el("div",{style:"min-height:100vh;background:#f4f7fb;display:flex;flex-direction:column;"});
  var hdr=el("div",{style:"background:#1a3a6b;padding:12px 16px;display:flex;align-items:center;gap:10px;"});
  var back=el("button",{style:"background:white;border:none;color:#1a3a6b;border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer;"},"← 一覧へ");
  back.addEventListener("click",function(){render("board");});
  hdr.appendChild(back);
  hdr.appendChild(el("span",{style:"color:#c8dcf4;font-size:12px;"},"シティハウス円山北3条"));
  d.appendChild(hdr);
  var body=el("div",{style:"padding:16px;max-width:680px;width:100%;"});
  body.appendChild(el("h1",{style:"font-size:17px;color:#1a3a6b;margin:0 0 10px;line-height:1.6;font-weight:bold;"},n.title));
  body.appendChild(el("p",{style:"font-size:13px;color:#555;margin:0 0 14px;"},n.date+" | "+n.tag));
  // PDFボタンをタイトル直下に配置
  var pdfUrl=n.pdf||null;
  if(pdfUrl){
    var pdfBtn=el("button",{style:"display:block;width:100%;text-align:center;background:#b91c1c;color:white;padding:16px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 12px rgba(185,28,28,0.3);"},
      "📄 PDFを表示する");
    pdfBtn.addEventListener("click",function(){render("pdfview");});
    body.appendChild(pdfBtn);
  }
  var tabs=[{k:"layer1",l:"📋 事実",c:"#1a3a6b",bg:"#eef3fb"},{k:"layer2",l:"🔍 分析",c:"#166534",bg:"#f0fdf4"},{k:"layer3",l:"💬 問いかけ",c:"#92400e",bg:"#fff7e6"}];
  var tabRow=el("div",{style:"display:flex;border-radius:8px 8px 0 0;overflow:hidden;border:1px solid #dce4f0;border-bottom:none;"});
  tabs.forEach(function(t,i){
    var btn=el("button",{style:"flex:1;padding:8px 3px;border:none;cursor:pointer;font-size:11px;"+(i<2?"border-right:1px solid #dce4f0;":"")+"background:"+(TAB===t.k?t.bg:"#f4f7fb")+";color:"+(TAB===t.k?t.c:"#888")+";font-weight:"+(TAB===t.k?"bold":"normal")+";"},t.l);
    (function(key){btn.addEventListener("click",function(){TAB=key;render("detail");});})(t.k);
    tabRow.appendChild(btn);
  });
  body.appendChild(tabRow);
  var ct=tabs.find(function(t){return t.k===TAB;});
  var box=el("div",{style:"background:"+ct.bg+";border:1px solid #dce4f0;border-top:none;border-radius:0 0 8px 8px;padding:14px;margin-bottom:12px;"});
  var pre=el("pre",{style:"white-space:pre-wrap;font-family:sans-serif;line-height:1.8;font-size:14px;color:#222;"},(n[TAB]||"").replace(/\\n/g,"\n"));
  box.appendChild(pre);body.appendChild(box);
  body.appendChild(el("div",{style:"padding:10px 12px;background:#eef3fb;border-radius:8px;border-left:4px solid #1a3a6b;font-size:12px;color:#1a3a6b;font-weight:bold;"},
    "📌 本ページは203号室　鈴木章三郎（個人）が公開情報に基づき作成したものです。管理組合の公式見解ではありません。"
  ));
  d.appendChild(body);
  return d;
}

function buildPdfView(){
  var n=SELECTED;
  var pdfUrl=n.pdf||null;
  var d=el("div",{style:"height:100vh;background:#f4f7fb;display:flex;flex-direction:column;overflow:hidden;"});
  var hdr=el("div",{style:"background:#1a3a6b;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;"});
  var back=el("button",{style:"background:white;border:none;color:#1a3a6b;border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer;flex-shrink:0;white-space:nowrap;"},"← 一覧へ");
  back.addEventListener("click",function(){render("board");});
  hdr.appendChild(back);
  hdr.appendChild(el("span",{style:"color:white;font-size:13px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;"},n.title));
  d.appendChild(hdr);
  var frameWrap=el("div",{style:"flex:1;position:relative;background:#525659;"});
  var fullPdfUrl="https://suzuki-maruyama.github.io/kumiai-board/"+pdfUrl;
  var isLine=/Line/i.test(navigator.userAgent);
  var viewerSrc=isLine?("https://docs.google.com/gview?embedded=true&url="+encodeURIComponent(fullPdfUrl)):pdfUrl;
  var frame=el("iframe",{src:viewerSrc,style:"position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:white;",title:n.title});
  frameWrap.appendChild(frame);
  d.appendChild(frameWrap);
  if(isLine){
    d.appendChild(el("div",{style:"text-align:center;padding:8px;font-size:11px;color:#888;background:#f4f7fb;flex-shrink:0;"},
      "表示されない場合は右下の「⋮」メニューから<strong>「他のアプリで開く」または「Safariで開く」</strong>を選択してください。&nbsp;<a href='"+fullPdfUrl+"' target='_blank' style='color:#1a3a6b;font-weight:bold;'>直接開く</a>"
    ));
  }else{
    d.appendChild(el("div",{style:"text-align:center;padding:8px;font-size:11px;color:#888;background:#f4f7fb;flex-shrink:0;"},
      "PDFが表示されない場合は<a href='"+pdfUrl+"' target='_blank' style='color:#1a3a6b;font-weight:bold;'>こちらを直接開く</a>"
    ));
  }
  return d;
}

render("top");
</script>
</body>
</html>
